# ============================================================
#  EXAMPLE STRUCTURE — Watchtower
# ============================================================
# This is an example structure definition showing how to add
# custom structures to Strata. Copy this file to your profile's
# structures/ directory and modify it.
#
# This watchtower spawns in plains and forest biomes, appearing
# roughly every 32 chunks with 8 chunks minimum spacing.
#
# To add a structure to your world:
#   1. Create a .toml file in profiles/<name>/structures/
#   2. Reference a schematic file (.schem) or use PROCEDURAL type
#   3. Configure placement, biome filters, and terrain adjustment
#   4. Reload with /strata reload
# ============================================================

# -------------------------------------------------------
# Structure Identity
# -------------------------------------------------------
# key: Unique identifier for this structure.
# Must be lowercase, no spaces. Uses namespace:key format.
# Valid values: Any unique string in namespace:key format
key = "strata:example_watchtower"

# display-name: Human-readable name shown in /strata info.
display-name = "Watchtower"

# -------------------------------------------------------
# Structure Type
# -------------------------------------------------------
# type: How this structure is built.
# Valid values:
#   "SCHEMATIC"   — Loaded from a .schem file (most common for custom structures)
#   "JIGSAW"      — Assembled from template pool pieces (like villages)
#   "PROCEDURAL"  — Generated by code at runtime via the API
# Default: "SCHEMATIC"
type = "SCHEMATIC"

# schematic: Path to the schematic file, relative to the profile's structures/ directory.
# Only used when type = "SCHEMATIC".
# Valid values: Any .schem file path
schematic = "example_tower.schem"

# -------------------------------------------------------
# Placement
# -------------------------------------------------------
[placement]
# spacing: Maximum distance between structure attempts, in chunks.
# The structure grid divides the world into cells of this size.
# Valid values: Integer, 1 to 512
# Default: 32
spacing = 32

# separation: Minimum distance between structures, in chunks.
# Must be less than spacing. Prevents structures from clustering.
# Valid values: Integer, 1 to spacing-1
# Default: 8
separation = 8

# salt: Random seed modifier for this structure's placement grid.
# Different salts produce different placement patterns.
# Valid values: Any integer
# Default: 10387312
salt = 10387312

# -------------------------------------------------------
# Biome Filter
# -------------------------------------------------------
# biomes: Which biomes this structure can spawn in.
# Use biome keys. Leave empty to allow all biomes.
# Valid values: List of biome key strings
# Default: [] (all biomes)
biomes = [
    "strata:verdant_plains",
    "strata:verdant_forest",
    "strata:verdant_rolling_hills",
    "strata:sanctuary_meadow",
    "strata:sanctuary_hillside"
]

# -------------------------------------------------------
# Terrain Adjustment
# -------------------------------------------------------
[terrain]
# adjust-to-terrain: Whether to adjust the structure's Y position
# to match the terrain surface. If false, places at a fixed Y.
# Valid values: true, false
# Default: true
adjust-to-terrain = true

# surface-offset: Y offset from the surface when adjust-to-terrain is true.
# Use 0 for ground level, -1 to bury one block, 1 to float one block.
# Valid values: Integer, -64 to 64
# Default: 0
surface-offset = 0

# flatten-radius: Radius (in blocks) around the structure to flatten terrain.
# Set to 0 to leave surrounding terrain untouched.
# Valid values: Integer, 0 to 32
# Default: 0
flatten-radius = 4

# -------------------------------------------------------
# Loot
# -------------------------------------------------------
[loot]
# table: Loot table to use for chests in this structure.
# Uses Minecraft loot table format.
# Valid values: Any loot table ID, or "none"
# Default: "none"
table = "minecraft:chests/simple_dungeon"

# -------------------------------------------------------
# Mob Spawning
# -------------------------------------------------------
[spawning]
# enabled: Whether to override mob spawning inside this structure's bounds.
# Valid values: true, false
# Default: false
enabled = false
