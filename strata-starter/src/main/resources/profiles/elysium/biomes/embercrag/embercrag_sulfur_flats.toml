# ============================================================
#  Biome: Sulfur Flats — Embercrag Volcanic
# ============================================================
# A flat, desolate expanse stained bright yellow and ochre by
# sulfuric deposits. The terrain is a patchwork of yellow terracotta
# and yellow concrete powder where volcanic gases have crystallized
# on the surface over centuries. Toxic-looking pools of green-
# tinted water dot the landscape — these are hot springs heated by
# geothermal vents below. The air smells of rotten eggs (hydrogen
# sulfide), and a yellow haze hangs at ground level. This is one
# of the most hostile biomes in the Embercrag — the combination of
# toxic atmosphere, hot springs, and aggressive mob spawns makes
# lingering here extremely dangerous.
#
# Gameplay Notes:
#   - Toxic pools deal damage over time (magma blocks beneath water).
#   - Yellow terracotta and concrete are unique building materials.
#   - The flat terrain offers no cover from ranged attacks.
#   - Sulfur haze particles reduce visibility at ground level.
#   - Bring fire resistance and regeneration potions.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>" — lowercase, underscores only.
id = "strata:embercrag_sulfur_flats"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Embercrag Sulfur Flats"

# category: The broad Minecraft biome category this belongs to.
# BADLANDS enables the warm amber sky tint.
category = "BADLANDS"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml.
zone = "embercrag"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: 0.9 = very hot — geothermal heat from below keeps
# the surface constantly warm, and the sulfuric deposits reflect
# heat back into the air.
temperature = 0.9

# humidity: -0.6 = very dry — despite the hot springs, the overall
# environment is arid. The pools are geothermal, not rain-fed.
humidity = -0.6

# continentalness: 0.7 = firmly inland — sulfur flats form in
# low-lying areas of the volcanic field where gases accumulate.
continentalness = 0.7

# erosion: 0.7 = heavily eroded — the flat terrain is the result
# of extensive erosion of softer volcanic deposits, leaving only
# the chemically altered sulfuric surface.
erosion = 0.7

# weirdness: 0.35 = moderately unusual — the sulfur deposits
# create a visually distinctive landscape that contrasts sharply
# with the dark volcanic rock surrounding it.
weirdness = 0.35

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: 3 = slightly above sea level. The sulfur flats sit
# in a shallow depression within the volcanic plateau — low enough
# to collect volcanic gases but above the water table.
# Range: -64.0 to 256.0, typical surface biomes: -5.0 to 30.0
base-height = 3

# height-variation: 2 = very flat. The sulfuric deposits have
# filled every depression, creating an almost perfectly level
# yellow-stained plain.
# Range: 0.0 (glass-flat) to 30.0 (extreme peaks)
height-variation = 2

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
[biome.surface]
# top-block: Yellow terracotta — the sulfuric deposits have stained
# the volcanic rock a vivid yellow, creating the biome's signature
# alien-looking surface.
top-block = "minecraft:yellow_terracotta"

# filler-block: Orange terracotta — beneath the bright yellow
# surface, the staining fades to a warm orange where the sulfur
# concentration decreases with depth.
filler-block = "minecraft:orange_terracotta"

# filler-depth: 3 = moderate staining depth. The sulfuric
# alteration extends only a few blocks before reaching unaltered
# volcanic rock.
# Range: 1 to 8.
filler-depth = 3

# underwater-block: Magma block — the geothermal hot springs are
# heated from below by active magma, which damages players who
# wade into the pools.
underwater-block = "minecraft:magma_block"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
[biome.features]
# trees: No vegetation survives in the toxic sulfuric environment.
trees = { types = [], density = 0.0 }

# grass-density: 0.0 = barren toxic terrain.
# Range: 0.0 to 100.0.
grass-density = 0.0

# flower-density: 0.0 = no flowers in the toxic soil.
# Range: 0.0 to 15.0.
flower-density = 0.0

# extra-features: Sulfur pools (water over magma), yellow concrete
# powder patches, and fumarole vents releasing particles.
extra-features = [
    { feature = "sulfur_pool", density = 3.0 },
    { feature = "yellow_powder_patch", density = 4.0 },
    { feature = "fumarole_vent", density = 2.0 },
    { feature = "dead_bush", density = 0.5 },
]

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
[biome.spawning]
# The sulfur flats are aggressively hostile. The toxic environment
# breeds dangerous mobs, and the flat, open terrain offers no
# escape from them.

# magma_cube: Magma cubes thrive near the geothermal vents.
# weight: 15 for a common presence.
# min-group/max-group: Groups of 1-3.
magma_cube = { weight = 15, min-group = 1, max-group = 3 }

# husk: Husks are the dominant undead — the dry heat preserves them.
# weight: 12 for a consistent melee threat.
# min-group/max-group: Packs of 2-4.
husk = { weight = 12, min-group = 2, max-group = 4 }

# witch: Witches are drawn to the alchemical properties of the
# sulfuric pools — they throw harmful potions at players.
# weight: 8 for a dangerous ranged threat.
witch = { weight = 8, min-group = 1, max-group = 1 }

# hostile-density-multiplier: The toxic environment breeds hostility.
# Mob spawn rates are elevated across the board.
hostile-density-multiplier = 1.3
