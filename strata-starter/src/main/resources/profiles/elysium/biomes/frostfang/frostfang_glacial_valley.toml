# ============================================================
#  Biome: Frostfang Glacial Valley — Frostfang Peaks
# ============================================================
# A broad U-shaped valley gouged from the mountain by an
# ancient glacier that has since retreated upslope. The
# valley floor is a flat expanse of gravel, cobblestone,
# and glacial till — debris left behind as the ice melted.
# A narrow frozen stream winds down the center, fed by
# meltwater that refreezes before reaching lower ground.
# The valley walls rise steeply on either side, giving
# the biome an enclosed, corridor-like feel. Erratic
# boulders — massive stone blocks carried by the glacier
# — sit incongruously on the gravel plain.
#
# Gameplay notes:
#   - Natural corridor that channels player movement
#     through the mountain range — a strategic chokepoint.
#   - Flat gravel floor makes this a good location for
#     paths and rail lines through the mountains.
#   - Glacial erratics (large stone outcrops) provide
#     natural shelter and defensive positions.
#   - Gravel floor supplies flint for arrows — valuable
#     in the hostile Frostfang environment.
#   - Pairs with frostfang_spruce_slope on valley walls
#     and frostfang_frozen_lake at the valley terminus.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
id = "strata:frostfang_glacial_valley"       # Unique registry ID
display-name = "Frostfang Glacial Valley"    # Shown in F3 debug & maps
category = "MOUNTAIN"                        # Mountain valley terrain
zone = "frostfang"                           # Parent zone for climate grouping

# ------------------------------------
#  Climate parameters
# ------------------------------------
# These values position the biome within the multi-noise
# climate system. The positive erosion value is key — it
# creates the flat, eroded valley floor that distinguishes
# this biome from the steep terrain around it. The slightly
# higher continentalness keeps it in the mountain interior.
[biome.climate]
temperature = -0.5          # Cold — sheltered from wind but no sun
humidity = 0.4              # Moderate moisture from meltwater stream
continentalness = 0.75      # Deep within the mountain range
erosion = 0.3               # High erosion — glacier carved flat floor
weirdness = -0.2            # Slightly negative — smooth, regular shape

# ------------------------------------
#  Terrain shape
# ------------------------------------
# base-height of 10 places the valley floor near sea level
# — glaciers carve valleys deep into the mountains. The
# very low height-variation of 5 creates the flat valley
# floor that makes this biome navigable. The steep walls
# are generated by adjacent high-elevation biomes.
[biome.terrain]
base-height = 10            # Low valley floor — carved by glacier
height-variation = 5        # +/-5 blocks — flat gravel plain

# ------------------------------------
#  Surface composition
# ------------------------------------
# The valley floor is coarse gravel — glacial till deposited
# as the ice retreated. Below the gravel, cobblestone
# represents the crushed rock substrate. The deep filler
# reflects the thick layer of glacial debris that filled
# the valley over millennia.
[biome.surface]
top-block = "minecraft:gravel"               # Glacial till surface
filler-block = "minecraft:cobblestone"       # Crushed rock beneath
filler-depth = 5                             # Deep glacial debris layer

# ------------------------------------
#  Feature generation
# ------------------------------------
# Almost no vegetation on the valley floor. The gravel
# substrate and cold temperatures prevent most plant
# growth. A few tufts of dead grass survive in sheltered
# spots near the frozen stream banks. No trees — the
# valley floor is too exposed and the soil too poor.
[biome.features]
trees = { types = [], density = 0.0 }    # No trees on bare gravel floor
grass-density = 0.05                     # Trace dead grass near stream

# ------------------------------------
#  Mob spawning
# ------------------------------------
# The valley acts as a natural funnel for mob movement.
# Strays wander the gravel flats at night, and the
# enclosed terrain makes them harder to avoid than in
# open biomes. Wolves occasionally enter from the
# adjacent spruce slopes to hunt. The flat, open floor
# means players have good visibility but limited cover.
[biome.spawning]
# Strays patrol the valley floor at night — long sight
# lines make them dangerous at range.
# Wolves may wander in from adjacent spruce slopes.
# Standard hostile mob rules in darkness.
# No passive mobs on the barren gravel floor.
