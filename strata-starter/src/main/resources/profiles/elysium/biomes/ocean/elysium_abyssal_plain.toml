# ============================================================
#  Biome: Abyssal Plain — Elysium Ocean
# ============================================================
# The deepest, most featureless expanse of ocean floor — a vast
# flat plain of gravel and sand stretching endlessly into the
# darkness. No light from the surface reaches here. The water
# pressure is immense, and the silence is absolute. Occasional
# patches of soul sand mark ancient burial grounds, and rare
# glow lichen provides the only faint illumination on exposed
# rock faces. This is the ocean's final frontier — a place of
# profound isolation and minimal resources.
#
# Gameplay notes:
#   - The deepest standard ocean biome at ~55 blocks below sea
#     level. Only ocean trenches go deeper.
#   - Extremely sparse features — this biome rewards patience
#     rather than active exploration.
#   - Soul sand patches can be harvested for soul-based builds.
#   - Near-total darkness means hostile mobs can spawn at any
#     time of day — Darkness effect may trigger.
#   - Minimal loot or resources — this biome exists to create
#     a sense of scale and emptiness between features.
#   - The flatness makes it suitable for large-scale underwater
#     construction if players are willing to work at depth.
#   - Borders elysium_deep_ocean above and elysium_ocean_trench
#     at its deepest edges.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The abyssal plain is the
# deepest flat ocean floor — the default deep-deep ocean.
id = "strata:elysium_abyssal_plain"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Abyssal Plain"

# category: OCEAN for aquatic mechanics and mob spawning.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.3 = cool. Abyssal water is uniformly cold,
# maintained at near-freezing temperatures by the lack of
# solar heating at depth.
temperature = 0.3

# humidity: 0.4 = slightly below standard. The mineral-rich
# but biologically dead water at extreme depth has lower
# effective humidity for biome placement.
humidity = 0.4

# continentalness: -0.9 = extremely oceanic. The abyssal plain
# sits at the maximum distance from any continental mass — the
# true centre of the ocean basin.
continentalness = -0.9

# erosion: 0.5 = moderately eroded. The abyssal floor is
# extremely flat — smoothed by millennia of slow sediment
# deposition from above.
erosion = 0.5

# weirdness: 0.0 = the default deep-ocean floor. No unusual
# features — this is the baseline abyss.
weirdness = 0.0

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -55 blocks below sea level. Nearly as deep as
# ocean trenches but spread across a vast, flat area rather
# than compressed into narrow cuts.
base-height = -55

# height-variation: 3 = minimal variation. The abyssal plain
# is defined by its overwhelming flatness — only the gentlest
# undulations break the monotony.
height-variation = 3

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Gravel floor. Fine abyssal sediment — particles
# that sank from the surface over millions of years.
top-block = "minecraft:gravel"

# filler-block: Sand beneath the gravel. Layered deep-ocean
# sediment with alternating grain sizes.
filler-block = "minecraft:sand"

# filler-depth: 3 blocks of sand before stone. Moderate
# sediment depth over the deep ocean bedrock.
filler-depth = 3

# underwater-block: Gravel on the ocean floor. Consistent with
# the uniform abyssal sediment character.
underwater-block = "minecraft:gravel"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — extreme-depth ocean floor.
trees = { types = [], density = 0.0 }

# grass-density: 0.0 = no vegetation. Complete darkness prevents
# any photosynthetic life at this depth.
grass-density = 0.0

# extra-features: Minimal features — the abyssal plain is
# deliberately sparse to emphasise emptiness and scale.
extra-features = [
    # Soul sand patches — ancient sediment with dark properties.
    { feature = "soul_sand_patch", density = 1.0 },
    # Glow lichen on rare rock outcrops — faint bioluminescence.
    { feature = "glow_lichen", density = 0.5 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Nearly devoid of life. Drowned wander the darkness in sparse
# groups. Glow squid are the only other inhabitants — their
# faint light is sometimes the only thing visible in the abyss.
[biome.spawning]
# Drowned in moderate density — sparse but persistent.
drowned = { weight = 15, min-group = 1, max-group = 3 }
# Glow squid — the abyss's sole bioluminescent inhabitants.
glow_squid = { weight = 8, min-group = 1, max-group = 2 }
