# ============================================================
#  Biome: Cold Ocean — Elysium Ocean
# ============================================================
# Dark green water with reduced visibility, where dense kelp
# forests grow so thick they block nearly all sunlight from
# reaching the floor. The water has a murky greenish cast from
# nutrient-rich cold currents upwelling from the deep. Schools
# of cod weave through the kelp in tight formations, their
# silver flanks flashing in the rare shafts of light. The
# overall atmosphere is sombre and slightly eerie — a working
# ocean rather than a postcard-pretty one.
#
# Gameplay notes:
#   - Dense kelp makes navigation underwater more difficult;
#     players may need to cut paths through the fronds.
#   - Cod is the primary food resource — large schools provide
#     reliable fishing even without a rod (nets/bucket).
#   - Reduced visibility increases ambush potential for drowned.
#   - Kelp density makes this an excellent fuel-farming biome
#     (dried kelp blocks are efficient furnace fuel).
#   - Borders elysium_frozen_sea at its coldest edge and
#     elysium_temperate_ocean at its warmer boundary.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. Cold ocean sits between
# temperate and frozen in the temperature gradient.
id = "strata:elysium_cold_ocean"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Cold Ocean"

# category: OCEAN for aquatic mechanics, mob spawning, and
# structure generation rules.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.0 = cold but not freezing. Water remains liquid
# but the nutrient-rich cold currents drive heavy kelp growth.
# Just above the threshold where ice begins forming on the surface.
temperature = 0.0

# humidity: 0.5 = standard oceanic moisture.
humidity = 0.5

# continentalness: -0.6 = offshore oceanic. Standard ocean
# distance from continental shelves.
continentalness = -0.6

# erosion: 0.3 = low-moderate erosion. Rocky floor with kelp
# anchored to stone surfaces between sediment patches.
erosion = 0.3

# weirdness: 0.0 = the standard cold ocean variant.
weirdness = 0.0

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -30 blocks below sea level. Same depth as
# temperate ocean — the cold variant is differentiated by
# temperature and vegetation density, not depth.
base-height = -30

# height-variation: 5 = moderate rolling floor. Rocky outcrops
# provide kelp anchor points amid gravel basins.
height-variation = 5

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Gravel floor. Cold-water oceans accumulate coarse
# sediment from glacial runoff and strong polar currents.
top-block = "minecraft:gravel"

# filler-block: Gravel extending below the surface. Thick
# deposits from cold-current sediment transport.
filler-block = "minecraft:gravel"

# filler-depth: 3 blocks of gravel over stone bedrock.
filler-depth = 3

# underwater-block: Gravel seabed consistent with the cold
# ocean's coarse-sediment character.
underwater-block = "minecraft:gravel"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — fully submerged biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.2 = sparse seagrass. Most of the floor is
# dominated by kelp holdfasts rather than seagrass.
grass-density = 0.2

# extra-features: Extremely dense kelp forests — the densest
# of any ocean biome. Kelp here forms near-impenetrable walls.
extra-features = [
    # Dense kelp forest — the biome's defining characteristic.
    { feature = "kelp", density = 12.0 },
    # Sparse seagrass in clearings between kelp stands.
    { feature = "tall_seagrass", density = 1.0 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Cod-dominated ecosystem. Dense kelp provides cover for large
# schools. Drowned lurk in the murky water more aggressively
# than in temperate zones due to reduced light levels.
[biome.spawning]
# Cod in very large schools — the cold ocean's signature mob.
cod = { weight = 20, min-group = 4, max-group = 8 }
# Salmon in moderate numbers, preferring clearer patches.
salmon = { weight = 8, min-group = 2, max-group = 4 }
# Squid in kelp corridors.
squid = { weight = 6, min-group = 1, max-group = 3 }
# Drowned more aggressive in the murky conditions.
drowned = { weight = 12, min-group = 1, max-group = 3 }
