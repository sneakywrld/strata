# ============================================================
#  Biome: Coral Reef Flat — Elysium Ocean
# ============================================================
# An expansive, impossibly vibrant shallow reef — the most
# visually stunning underwater biome in the Elysium profile.
# Every type of coral grows here in dense, interlocking
# formations: brain coral, tube coral, horn coral, fire coral,
# and fan coral create a living mosaic of pink, purple, yellow,
# blue, and red. Sea pickles cluster on every available surface,
# their bioluminescent glow making the reef shimmer at night.
# Sponge blocks are scattered among the coral — the only
# natural source of this rare block.
#
# Gameplay notes:
#   - The richest source of all coral types in the game.
#   - Sponge blocks generate naturally here — use silk touch
#     to harvest them for water-clearing builds.
#   - Sea pickles in massive quantities for underwater lighting.
#   - Very shallow (~8 blocks) — no enchantments needed.
#   - Tropical fish here have the most colour variants.
#   - The flat terrain and shallow depth make this an ideal
#     location for underwater base construction.
#   - Connects to elysium_warm_ocean at its deeper edges and
#     elysium_seagrass_meadow in calmer pockets.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The coral reef flat is the
# premium coral biome — denser and more diverse than warm ocean.
id = "strata:elysium_coral_reef_flat"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Coral Reef Flat"

# category: OCEAN for aquatic mechanics and coral generation.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.8 = warm tropical. Maximum warmth for optimal
# coral growth — this is the reef's sweet spot.
temperature = 0.8

# humidity: 0.6 = slightly elevated moisture. The dense coral
# growth creates a microclimate of higher biological activity.
humidity = 0.6

# continentalness: -0.5 = nearshore oceanic. Reef flats form
# on shallow continental shelves close to landmasses, where
# sunlight penetrates easily and nutrients are available.
continentalness = -0.5

# erosion: 0.6 = highly eroded/flat. The reef top is a broad,
# nearly flat platform — the coral itself creates the texture
# rather than the underlying terrain.
erosion = 0.6

# weirdness: 0.2 = slightly unusual. Reef flats are less common
# than standard warm ocean, requiring a minor weirdness nudge
# to distinguish them in the noise function.
weirdness = 0.2

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -8 blocks below sea level. Extremely shallow —
# some coral formations nearly break the surface at low points.
# Players can swim across the reef flat with their head above water.
base-height = -8

# height-variation: 2 = very flat. The reef platform is a
# uniform shelf with minimal elevation change. Individual coral
# formations add visual height without affecting terrain noise.
height-variation = 2

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Sand floor beneath the coral formations. White
# coral sand from millennia of reef erosion.
top-block = "minecraft:sand"

# filler-block: Sand continuing below the surface. Deep coral
# sand bed accumulated over the reef's geological lifetime.
filler-block = "minecraft:sand"

# filler-depth: 5 blocks of sand. Thick deposits from constant
# coral debris breakdown on this mature reef platform.
filler-depth = 5

# underwater-block: Sand seabed consistent with the tropical
# coral reef environment.
underwater-block = "minecraft:sand"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — shallow submerged reef biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.3 = sparse seagrass between coral formations.
# Coral dominates the floor space, leaving little room for grass.
grass-density = 0.3

# extra-features: Maximum density coral and sea pickle generation.
# This biome has the highest coral density in the entire profile.
extra-features = [
    # Dense coral reef — every type in maximum abundance.
    { feature = "coral_reef", density = 12.0 },
    # Sea pickles on every coral surface — bioluminescent carpet.
    { feature = "sea_pickle", density = 8.0 },
    # Sponge blocks scattered among the coral — rare and valuable.
    { feature = "sponge_patch", density = 1.0 },
    # Seagrass in gaps between coral formations.
    { feature = "tall_seagrass", density = 2.0 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# The most diverse aquatic ecosystem in the profile. Every
# tropical species appears here in maximum density. Pufferfish
# are the only hazard — no drowned in the bright shallows.
[biome.spawning]
# Tropical fish in massive, colourful schools.
tropical_fish = { weight = 30, min-group = 5, max-group = 10 }
# Pufferfish guarding coral formations — poison hazard.
pufferfish = { weight = 10, min-group = 1, max-group = 3 }
# Turtles cruising over the reef flat.
turtle = { weight = 8, min-group = 2, max-group = 4 }
# Squid in the deeper pockets between reef sections.
squid = { weight = 4, min-group = 1, max-group = 2 }
