# ============================================================
#  Biome: Deep Frozen Ocean — Elysium Ocean
# ============================================================
# The darkest and coldest ocean biome — deep frigid water
# sealed beneath a thick ice sheet. Below the surface, massive
# underwater ice formations extend downward like inverted
# mountains, their blue-white bulk glowing faintly in the
# darkness. The water is so cold that exposed skin takes damage
# without frost protection. Drowned congregate in the permanent
# darkness, their glowing eyes the only points of light in the
# abyss beneath the ice.
#
# Gameplay notes:
#   - Combined hazards of deep water AND ice cover make this
#     one of the most dangerous ocean biomes.
#   - Underwater ice formations contain blue ice — extremely
#     valuable but difficult to harvest at depth.
#   - Players who break through the ice may struggle to find
#     the hole again from below.
#   - Frost resistance, water breathing, AND night vision are
#     all strongly recommended for exploration.
#   - Drowned density is elevated — expect combat.
#   - The ice surface above can be used for overland travel
#     but is far from any land-based resources.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. Combines the depth of
# deep ocean with the ice cover of frozen sea.
id = "strata:elysium_deep_frozen_ocean"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Deep Frozen Ocean"

# category: OCEAN for aquatic mechanics and mob spawning.
# The frozen surface is handled by temperature-driven ice
# generation rather than a separate category.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: -0.7 = deeply frozen. Matches frozen sea
# temperature, ensuring complete ice coverage on the surface.
temperature = -0.7

# humidity: 0.5 = standard oceanic moisture.
humidity = 0.5

# continentalness: -0.8 = far offshore. Deep ocean position
# beyond the continental shelf, now under permanent ice.
continentalness = -0.8

# erosion: 0.5 = moderately eroded. The deep floor beneath
# the ice is smooth, shaped by slow polar bottom currents.
erosion = 0.5

# weirdness: 0.0 = the standard deep frozen variant.
weirdness = 0.0

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -45 blocks below sea level. Same depth as deep
# ocean — the ice cover adds hazard without changing the floor
# elevation. Underwater ice formations extend from the surface
# ice downward, partially filling the water column.
base-height = -45

# height-variation: 5 = moderate variation. Underwater ice
# roots and rocky floor create varied terrain.
height-variation = 5

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Ice cap on the surface. The frozen ocean floor
# beneath the water uses gravel, but the surface generation
# layer places ice at the waterline.
top-block = "minecraft:ice"

# filler-block: Packed ice for the ice cap's subsurface mass
# and the roots of underwater ice formations.
filler-block = "minecraft:packed_ice"

# filler-depth: 5 blocks of packed ice — thicker than shallow
# frozen sea because the deep freeze extends further down.
filler-depth = 5

# underwater-block: Gravel on the ocean floor far below the
# ice. Dark, cold sediment undisturbed by any current.
underwater-block = "minecraft:gravel"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — frozen deep ocean biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.0 = no vegetation. Complete darkness beneath
# the ice prevents any plant growth on the ocean floor.
grass-density = 0.0

# extra-features: Underwater ice formations and icebergs are
# the primary terrain features — massive ice roots descending
# from the surface ice cap into the dark water.
extra-features = [
    # Underwater ice formations — inverted ice mountains.
    { feature = "underwater_ice", density = 3.0 },
    # Icebergs penetrating deep from the surface.
    { feature = "iceberg", density = 2.0 },
    # Blue ice veins within the ice formations.
    { feature = "blue_ice_patch", density = 1.5 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Drowned are the dominant mob in the permanent darkness. No
# passive aquatic life survives in the freezing depths. This
# is one of the most hostile aquatic environments in the game.
[biome.spawning]
# Drowned in high density — the darkness is their domain.
drowned = { weight = 18, min-group = 2, max-group = 4 }
# Strays on the ice surface above.
stray = { weight = 10, min-group = 1, max-group = 3 }
# Polar bears on the ice — rare at this distance from shore.
polar_bear = { weight = 4, min-group = 1, max-group = 2 }
