# ============================================================
#  Biome: Deep Ocean — Elysium Ocean
# ============================================================
# Beyond the continental shelf, the ocean floor drops away
# sharply into dark blue water. This is the realm of ocean
# monuments — massive prismarine structures guarded by elder
# guardians and their lesser kin. The water is deep enough
# that sunlight barely reaches the floor, creating a twilight
# zone where visibility fades and the pressure of the deep
# becomes palpable. Sparse kelp clings to rocky outcrops, but
# most of the floor is bare gravel and stone.
#
# Gameplay notes:
#   - Ocean monuments generate here — the primary source of
#     prismarine, sea lanterns, and sponge.
#   - Elder guardians inflict Mining Fatigue III, making
#     monument raiding a serious challenge.
#   - Depth of ~45 blocks requires Respiration III and/or
#     water breathing potions for floor exploration.
#   - Conduit power is almost mandatory for extended stays.
#   - Guardian farms built here are among the most productive
#     XP farms in the game.
#   - Transitions from elysium_temperate_ocean at the shelf
#     edge and into elysium_ocean_trench at the deepest cuts.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The deep ocean is the
# standard deep-water biome where ocean monuments spawn.
id = "strata:elysium_deep_ocean"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Deep Ocean"

# category: OCEAN for aquatic mechanics, monument generation,
# and guardian spawning rules.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.4 = cool temperate. Deep water maintains
# stable temperatures — neither warm nor cold, consistent
# with the thermocline layer below surface heating.
temperature = 0.4

# humidity: 0.5 = standard oceanic moisture.
humidity = 0.5

# continentalness: -0.8 = far offshore. More oceanic than
# standard ocean (-0.6), placing this biome beyond the
# continental shelf where the floor drops dramatically.
continentalness = -0.8

# erosion: 0.5 = moderately eroded. The deep floor is
# relatively smooth, shaped by abyssal currents over eons.
erosion = 0.5

# weirdness: 0.0 = the standard deep ocean variant.
weirdness = 0.0

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -45 blocks below sea level. Deep enough to
# require enchantments for floor exploration. Ocean monuments
# sit on the floor at this depth, their spires reaching upward
# through the dark water.
base-height = -45

# height-variation: 5 = moderate variation. The deep floor has
# gentle swells and depressions but no dramatic features.
height-variation = 5

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Gravel floor. Deep ocean sediment is coarse,
# deposited by slow abyssal currents over geological time.
top-block = "minecraft:gravel"

# filler-block: Gravel continuing below the surface. Deep
# ocean sediment layers are thick and uniform.
filler-block = "minecraft:gravel"

# filler-depth: 3 blocks of gravel before stone bedrock.
filler-depth = 3

# underwater-block: Gravel seabed. Consistent with deep
# ocean conditions — too dark for sand-producing coral.
underwater-block = "minecraft:gravel"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — deep submerged biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.1 = very sparse seagrass. Minimal light
# penetration limits plant growth at this depth.
grass-density = 0.1

# extra-features: Sparse kelp and ocean floor details.
# The deep ocean is relatively barren compared to shallower zones.
extra-features = [
    # Sparse kelp reaching up from rocky outcrops.
    { feature = "kelp", density = 2.0 },
    # Magma blocks on the floor — rare geothermal vents.
    { feature = "magma_vent", density = 0.5 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Guardians are the dominant mob near monuments. Squid and cod
# still appear but in reduced numbers due to the low light.
# Drowned are more common than in shallow water.
[biome.spawning]
# Guardians near ocean monuments — the defining hostile mob.
guardian = { weight = 15, min-group = 1, max-group = 4 }
# Squid in the deep water — larger individuals than shallow zones.
squid = { weight = 8, min-group = 1, max-group = 3 }
# Cod in sparse schools — less common in the dark depths.
cod = { weight = 6, min-group = 2, max-group = 4 }
# Drowned lurking on the ocean floor.
drowned = { weight = 12, min-group = 1, max-group = 3 }
