# ============================================================
#  Biome: Frozen Sea — Elysium Ocean
# ============================================================
# A hostile expanse of pack ice stretching across the ocean
# surface. Massive icebergs calved from glaciers drift through
# the scene, their underwater bulk dwarfing the visible tips.
# Cracks in the ice reveal dark, frigid water below — dangerous
# to fall into without frost resistance. Polar bears patrol the
# ice floes, and frozen shipwrecks jut from the pack ice at
# broken angles, their hulls crushed by the relentless pressure.
#
# Gameplay notes:
#   - Pack ice surface allows overland travel across the ocean,
#     but cracks and thin spots can drop players into the water.
#   - Icebergs contain packed ice and blue ice — valuable for
#     ice-road construction and compact transport systems.
#   - Polar bears are neutral unless cubs are nearby.
#   - Frozen shipwrecks contain loot chests with maps, iron,
#     and occasionally buried treasure maps.
#   - Strays spawn on the ice surface at night.
#   - Frost resistance or fire resistance potions recommended
#     for extended exploration.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The frozen sea represents
# the coldest surface ocean biome before deep frozen variants.
id = "strata:elysium_frozen_sea"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Frozen Sea"

# category: OCEAN — despite the ice cover, the underlying water
# still uses ocean mechanics for structure and mob generation.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: -0.7 = deeply frozen. Well below the ice
# formation threshold, ensuring a permanent ice sheet across
# the water surface and iceberg generation.
temperature = -0.7

# humidity: 0.5 = standard oceanic moisture. Cold air holds
# less moisture in reality, but the ocean surface maintains
# consistent humidity for biome placement purposes.
humidity = 0.5

# continentalness: -0.6 = offshore oceanic. The ice extends
# well beyond the coastline into open water.
continentalness = -0.6

# erosion: 0.3 = low-moderate erosion. The ice surface is
# relatively flat with pressure ridges and iceberg interruptions.
erosion = 0.3

# weirdness: 0.0 = the standard frozen sea variant.
weirdness = 0.0

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -25 blocks below sea level. Moderately deep
# water beneath the ice — deep enough to be lethal if a player
# falls through but not as deep as true deep ocean.
base-height = -25

# height-variation: 5 = moderate variation from icebergs and
# underwater ice formations extending below the surface.
height-variation = 5

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Ice on the surface. The frozen sea is defined by
# its ice-covered water surface — the top block is ice rather
# than sand or gravel because generation caps the water with ice.
top-block = "minecraft:ice"

# filler-block: Packed ice beneath the surface ice. Icebergs
# use packed ice for their dense underwater mass.
filler-block = "minecraft:packed_ice"

# filler-depth: 4 blocks of packed ice for iceberg foundations
# and pressure ridges extending below the surface.
filler-depth = 4

# underwater-block: Gravel on the ocean floor beneath the ice.
# Cold-water sediment consistent with polar ocean conditions.
underwater-block = "minecraft:gravel"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — frozen ocean surface and underwater.
trees = { types = [], density = 0.0 }

# grass-density: 0.0 = no vegetation. The ice cover prevents
# any plant growth on the surface or below.
grass-density = 0.0

# extra-features: Icebergs and frozen shipwrecks define the
# visual landscape of the frozen sea.
extra-features = [
    # Icebergs — massive ice formations protruding above and below.
    { feature = "iceberg", density = 3.0 },
    # Blue ice patches within icebergs — rare and valuable.
    { feature = "blue_ice_patch", density = 1.0 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Polar bears are the signature mob on the ice surface. Below
# the ice, the water is nearly devoid of life. Strays replace
# skeletons on the frozen surface at night. Drowned lurk
# beneath the ice in the dark water.
[biome.spawning]
# Polar bears patrolling the ice floes — neutral unless provoked.
polar_bear = { weight = 8, min-group = 1, max-group = 2 }
# Strays on the ice surface at night — cold-adapted skeletons.
stray = { weight = 12, min-group = 1, max-group = 3 }
# Drowned beneath the ice — the primary underwater threat.
drowned = { weight = 10, min-group = 1, max-group = 2 }
