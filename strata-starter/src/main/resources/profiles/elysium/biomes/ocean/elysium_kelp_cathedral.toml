# ============================================================
#  Biome: Kelp Cathedral — Elysium Ocean
# ============================================================
# An underwater forest of extraordinary scale. Kelp here grows
# taller and denser than anywhere else in the ocean, forming
# towering columns that stretch from the ocean floor nearly to
# the surface. Sunlight filters through the kelp canopy in
# golden-green shafts, creating a cathedral-like atmosphere of
# hushed reverence. The kelp columns are so thick they form
# natural walls and corridors — an underwater maze that is
# both beautiful and disorienting. Cod swim through the green-
# lit passages in lazy schools.
#
# Gameplay notes:
#   - The densest kelp biome — massive fuel-farming potential
#     (dried kelp blocks for smelting operations).
#   - Navigation is challenging: the kelp walls block line of
#     sight and can trap careless swimmers.
#   - The column structure creates natural rooms and corridors
#     that creative builders can incorporate into underwater bases.
#   - Cod density is high — reliable food source for ocean bases.
#   - The filtered light creates a unique visual atmosphere
#     unlike any other biome — worth visiting for aesthetics alone.
#   - Drowned can hide behind kelp columns — stay alert.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The kelp cathedral is a
# unique variant — denser than any standard kelp forest.
id = "strata:elysium_kelp_cathedral"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Kelp Cathedral"

# category: OCEAN for aquatic mechanics and mob spawning.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.3 = cool. Kelp thrives in cool, nutrient-rich
# water. Slightly cooler than temperate ocean to favour maximum
# kelp density over competing seagrass.
temperature = 0.3

# humidity: 0.6 = slightly elevated. The dense biomass creates
# a richer local environment with higher dissolved oxygen.
humidity = 0.6

# continentalness: -0.6 = offshore oceanic. Standard ocean
# position — kelp cathedrals form on moderate-depth ocean floors
# with good rock anchor points.
continentalness = -0.6

# erosion: 0.4 = moderate erosion. The floor has enough rocky
# outcrops for kelp holdfasts but is not overly rough.
erosion = 0.4

# weirdness: 0.3 = moderately unusual. Kelp cathedrals are a
# rare formation — the weirdness value ensures they only appear
# in specific noise pockets, making discovery memorable.
weirdness = 0.3

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -25 blocks below sea level. Deep enough for the
# kelp columns to reach impressive heights (20+ blocks) while
# still allowing some light to filter through from above.
base-height = -25

# height-variation: 5 = moderate rolling floor. Rocky ridges
# provide varied kelp anchor heights, contributing to the
# column-and-corridor structure.
height-variation = 5

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Stone floor. The kelp cathedral needs hard rock
# anchor points for the massive kelp holdfasts. Stone provides
# a natural-looking reef floor beneath the kelp forest.
top-block = "minecraft:stone"

# filler-block: Stone continuing below. Solid rock substrate
# supporting the kelp forest's root system.
filler-block = "minecraft:stone"

# filler-depth: 3 blocks of stone before deeper geology.
filler-depth = 3

# underwater-block: Gravel in patches between rock outcrops.
# Sediment settles in the calm water between kelp columns.
underwater-block = "minecraft:gravel"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — submerged ocean biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.2 = sparse seagrass at the base of kelp
# columns where filtered light still reaches the floor.
grass-density = 0.2

# extra-features: Maximum kelp density — the defining feature.
# The cathedral effect comes from extremely dense, tall kelp
# growing in columnar formations.
extra-features = [
    # Kelp in maximum density — towering columns to the surface.
    { feature = "kelp", density = 16.0 },
    # Seagrass at the column bases.
    { feature = "tall_seagrass", density = 1.5 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Cod dominate the kelp corridors. The dense vegetation provides
# cover for both prey fish and predatory drowned. Glow squid
# add atmospheric bioluminescence to the darker corridors.
[biome.spawning]
# Cod in large schools navigating the kelp corridors.
cod = { weight = 18, min-group = 4, max-group = 8 }
# Glow squid drifting between the columns — bioluminescent.
glow_squid = { weight = 8, min-group = 1, max-group = 3 }
# Drowned hiding behind kelp columns — ambush predators.
drowned = { weight = 10, min-group = 1, max-group = 2 }
