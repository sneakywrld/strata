# ============================================================
#  Biome: Ocean Trench — Elysium Ocean
# ============================================================
# Narrow, terrifyingly deep cuts in the ocean floor that plunge
# to depths where no sunlight reaches. The walls are sheer rock,
# sometimes narrowing to claustrophobic gaps barely wide enough
# for a player to squeeze through. At the very bottom, magma
# vents glow orange through the darkness, heating columns of
# water into shimmering convection currents. Rare ore veins are
# exposed in the trench walls — deposits unreachable anywhere
# else, pushed to the surface by tectonic pressure.
#
# Gameplay notes:
#   - Deepest ocean biome — base at ~60 blocks below sea level.
#     Full enchantment suite required (Respiration III, Depth
#     Strider III, Aqua Affinity, Night Vision).
#   - Magma vents deal damage on contact and create bubble
#     columns that drag players downward.
#   - Rare ores exposed in trench walls reward daring miners.
#   - Darkness effect may trigger at the deepest points.
#   - Drowned density is very high — combat in tight quarters.
#   - Magma blocks on the floor provide emergency air bubbles
#     (bubble columns) but at the cost of fire damage.
#   - One of the most challenging PvE environments in Elysium.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. Ocean trenches are the
# deepest and most dangerous ocean terrain feature.
id = "strata:elysium_ocean_trench"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Ocean Trench"

# category: OCEAN for aquatic mechanics. Despite the extreme
# depth, this uses standard ocean rules for structure and mob
# generation with biome-specific overrides.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.3 = cool. Deep water maintains near-freezing
# temperatures at the trench floor, moderated slightly by
# geothermal activity from the magma vents.
temperature = 0.3

# humidity: 0.5 = standard oceanic moisture.
humidity = 0.5

# continentalness: -0.9 = extremely oceanic. Trenches form at
# the most distant points from any continental mass, where
# tectonic plates collide or diverge.
continentalness = -0.9

# erosion: -0.3 = negative erosion (resistant terrain). The
# trench walls are hard rock that resists smoothing, maintaining
# their sheer, dramatic profiles.
erosion = -0.3

# weirdness: 0.3 = moderately unusual. Trenches are uncommon
# features — the weirdness value ensures they only generate
# in specific noise pockets, keeping them rare and memorable.
weirdness = 0.3

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -60 blocks below sea level. The deepest point
# in the ocean system. Players at this depth are in near-total
# darkness without Night Vision.
base-height = -60

# height-variation: 5 = moderate variation. The trench floor
# is uneven with rock outcrops and magma vent mounds, but the
# variation is limited compared to the sheer walls.
height-variation = 5

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Stone floor. At this depth, sediment is minimal —
# the trench floor is exposed bedrock scraped clean by
# geological forces.
top-block = "minecraft:stone"

# filler-block: Deepslate beneath the thin stone surface.
# Trench depths approach the deepslate layer, exposing the
# transition between stone and deepslate geology.
filler-block = "minecraft:deepslate"

# filler-depth: 3 blocks of deepslate before true bedrock
# generation takes over.
filler-depth = 3

# underwater-block: Stone on the trench floor. No sediment
# accumulates in the strong convection currents.
underwater-block = "minecraft:stone"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — extreme-depth submerged biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.0 = no vegetation whatsoever. No light
# reaches the trench floor for photosynthesis.
grass-density = 0.0

# extra-features: Magma vents and rare mineral deposits are
# the trench's distinctive features — geothermal activity
# replacing the biological features of shallower biomes.
extra-features = [
    # Magma vents — glowing magma blocks on the trench floor.
    { feature = "magma_vent", density = 4.0 },
    # Obsidian formations where magma meets cold water.
    { feature = "obsidian_patch", density = 2.0 },
    # Rare ore veins exposed in the trench walls by pressure.
    { feature = "deep_ore_vein", density = 1.5 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# The trench is dominated by drowned — their density is the
# highest of any ocean biome. The permanent darkness and tight
# quarters make combat extremely dangerous. No passive mobs
# survive at this depth.
[biome.spawning]
# Drowned in very high density — the darkness breeds them.
drowned = { weight = 25, min-group = 2, max-group = 5 }
# Glow squid in the darkness — their bioluminescence is
# sometimes the only warning of nearby drowned.
glow_squid = { weight = 6, min-group = 1, max-group = 3 }
