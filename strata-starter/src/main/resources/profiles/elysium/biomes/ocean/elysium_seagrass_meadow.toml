# ============================================================
#  Biome: Seagrass Meadow — Elysium Ocean
# ============================================================
# A peaceful expanse of shallow, sun-drenched water where
# dense beds of seagrass blanket the sandy bottom in flowing
# green. The grass sways gently in the current, creating a
# mesmerising ripple effect visible from the surface. Turtles
# graze contentedly on the seagrass, surfacing periodically to
# breathe. The water is warm, clear, and inviting — this is
# the most tranquil ocean biome in Elysium, a place of calm
# between the vibrant reefs and the open ocean.
#
# Gameplay notes:
#   - Abundant seagrass for bone meal production (composting).
#   - Turtle spawns are the highest here — scute farming.
#   - Very shallow (~10 blocks) and peaceful — ideal for new
#     players to experience ocean content safely.
#   - No hostile aquatic mobs spawn in the bright shallows.
#   - Sandy bottom is easy to dig for hidden clay deposits.
#   - Excellent location for underwater wheat/crop farms using
#     the high light level and shallow depth.
#   - Transitions into elysium_warm_ocean at deeper edges and
#     elysium_coral_reef_flat where coral begins appearing.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The seagrass meadow is the
# gentlest ocean biome — shallow, peaceful, and productive.
id = "strata:elysium_seagrass_meadow"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Seagrass Meadow"

# category: OCEAN for aquatic mechanics and mob spawning.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.5 = moderate warmth. Comfortable water
# temperature that supports lush seagrass growth without
# being warm enough for coral competition.
temperature = 0.5

# humidity: 0.5 = standard oceanic moisture.
humidity = 0.5

# continentalness: -0.5 = nearshore oceanic. Seagrass meadows
# form on shallow shelves close to continental margins where
# nutrient runoff and sunlight combine optimally.
continentalness = -0.5

# erosion: 0.5 = moderate erosion. The meadow floor is gently
# undulating sand — smoothed by mild currents but not glass-flat.
erosion = 0.5

# weirdness: 0.1 = very slightly unusual. Seagrass meadows are
# fairly common but distinct enough from standard ocean to
# warrant a small weirdness offset.
weirdness = 0.1

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -10 blocks below sea level. Shallow enough for
# full sunlight penetration, keeping the seagrass healthy and
# the water bright and inviting.
base-height = -10

# height-variation: 2 = very flat. The meadow floor is a smooth,
# gently rolling sand bed — the seagrass itself provides all the
# visual texture rather than terrain features.
height-variation = 2

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Sand floor. Clean sandy bottom ideal for seagrass
# rooting and easy excavation.
top-block = "minecraft:sand"

# filler-block: Sand continuing below. Thick sediment deposits
# in the calm, shallow water.
filler-block = "minecraft:sand"

# filler-depth: 4 blocks of sand. Deep sediment bed accumulated
# in the sheltered shallows over geological time.
filler-depth = 4

# underwater-block: Sand seabed consistent with the meadow's
# gentle, sandy character.
underwater-block = "minecraft:sand"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — shallow submerged biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.8 = very dense seagrass. This is the
# defining feature — the densest seagrass coverage of any biome.
grass-density = 0.8

# extra-features: Seagrass dominates with scattered sea pickles
# and occasional clay deposits in the sandy floor.
extra-features = [
    # Tall seagrass — the biome's signature dense coverage.
    { feature = "tall_seagrass", density = 10.0 },
    # Short seagrass filling gaps between tall patches.
    { feature = "seagrass", density = 6.0 },
    # Clay deposits visible in the sandy floor.
    { feature = "clay_deposit", density = 2.0 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Turtles are the signature mob — the meadow is their preferred
# habitat. Tropical fish and squid add colour and movement.
# No hostile spawns in the bright, shallow water.
[biome.spawning]
# Turtles in high density — the meadow's signature passive mob.
turtle = { weight = 15, min-group = 2, max-group = 5 }
# Tropical fish in moderate schools.
tropical_fish = { weight = 10, min-group = 3, max-group = 6 }
# Squid drifting through the seagrass.
squid = { weight = 6, min-group = 1, max-group = 3 }
