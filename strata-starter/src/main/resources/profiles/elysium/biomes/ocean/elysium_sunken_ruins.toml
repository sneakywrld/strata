# ============================================================
#  Biome: Sunken Ruins — Elysium Ocean
# ============================================================
# A haunted stretch of deep ocean floor littered with the
# crumbling remnants of an ancient civilisation. Stone brick
# walls rise from the silt at broken angles, their surfaces
# covered in moss and barnacles. Collapsed arches frame views
# of dark corridors below, and scattered treasure chests glint
# faintly in the murk. Drowned guardians patrol the ruins in
# organised groups, defending their sunken domain with tridents
# and relentless aggression. This biome tells a story of a
# great city lost to the rising sea.
#
# Gameplay notes:
#   - Rich loot in buried and exposed treasure chests — maps,
#     enchanted gear, gold, emeralds, and rare items.
#   - Drowned here have elevated trident drop rates, making
#     this the best biome for trident farming.
#   - Stone brick and mossy stone brick are plentiful for
#     harvesting as building materials.
#   - Depth of ~40 blocks requires enchantments for sustained
#     exploration and combat.
#   - The ruins provide natural cover for players but also
#     create ambush opportunities for drowned.
#   - Pairs with elysium_deep_ocean at its edges and
#     elysium_abyssal_plain at greater depths.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The sunken ruins biome is
# a lore-rich exploration target with enhanced loot tables.
id = "strata:elysium_sunken_ruins"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Sunken Ruins"

# category: OCEAN for aquatic mechanics and mob spawning.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.4 = cool temperate. The ruins sit in standard
# deep-water temperature conditions — no thermal anomalies.
temperature = 0.4

# humidity: 0.5 = standard oceanic moisture.
humidity = 0.5

# continentalness: -0.7 = deep oceanic. The ruins are far enough
# from shore that they were submerged by major geological change
# rather than minor sea level rise.
continentalness = -0.7

# erosion: 0.3 = low-moderate erosion. The stone ruins resist
# weathering better than the surrounding seabed, creating
# elevated structures above the eroded floor.
erosion = 0.3

# weirdness: 0.5 = notably unusual. Sunken ruins are rare
# features — the high weirdness value restricts them to uncommon
# noise regions, making discovery a significant event.
weirdness = 0.5

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -40 blocks below sea level. Deep enough to
# require enchantments but not as deep as abyssal biomes.
# The ruins sit on a raised platform above the surrounding
# deep ocean floor.
base-height = -40

# height-variation: 5 = moderate variation. Collapsed walls
# and intact structures create localised height differences
# above the relatively flat ruin-floor baseline.
height-variation = 5

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Mossy stone bricks on the ruin surfaces. The
# ancient construction material, now overgrown with aquatic
# moss and barnacles.
top-block = "minecraft:mossy_stone_bricks"

# filler-block: Stone bricks beneath the mossy surface layer.
# The intact structural core of the ancient buildings.
filler-block = "minecraft:stone_bricks"

# filler-depth: 4 blocks of stone bricks. Thick construction
# foundations extending below the visible ruin surfaces.
filler-depth = 4

# underwater-block: Gravel on the ocean floor between ruins.
# Silt and debris accumulated around the collapsed structures.
underwater-block = "minecraft:gravel"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — deep submerged ruin biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.1 = very sparse seagrass clinging to the
# ruin surfaces where sediment has accumulated in cracks.
grass-density = 0.1

# extra-features: Ruin-specific features — treasure, structural
# debris, and atmospheric details.
extra-features = [
    # Kelp growing on ruin walls — nature reclaiming the city.
    { feature = "kelp", density = 3.0 },
    # Sea lanterns still glowing in intact sections — ancient light.
    { feature = "sea_lantern_ruin", density = 1.5 },
    # Treasure chests scattered among the collapsed structures.
    { feature = "buried_treasure", density = 1.0 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Drowned guardians patrol the ruins in organised groups.
# These drowned have enhanced gear — tridents, chain armour,
# and nautilus shells. The ruins are a combat-focused biome.
[biome.spawning]
# Drowned in high density — the ruin guardians. Armed variants
# are more common here than in any other ocean biome.
drowned = { weight = 25, min-group = 2, max-group = 5 }
# Glow squid among the ruins — attracted to the sea lanterns.
glow_squid = { weight = 6, min-group = 1, max-group = 3 }
# Cod in sparse schools — the ruins are too dangerous for
# large fish populations.
cod = { weight = 4, min-group = 2, max-group = 4 }
