# ============================================================
#  Biome: Underwater Ridge — Elysium Ocean
# ============================================================
# A mid-ocean ridge where tectonic forces push the ocean floor
# upward in a long, dramatic spine of volcanic rock. The ridge
# rises 20-30 blocks above the surrounding deep ocean floor,
# its flanks lined with magma blocks that glow orange through
# the dark water. Hydrothermal vents along the ridge crest spew
# columns of hot water, creating shimmering convection effects.
# Unique mineral deposits — gold, copper, and iron — are
# exposed in the volcanic rock, pushed to the surface by
# geological pressure from below.
#
# Gameplay notes:
#   - Significant height variation (20) creates dramatic
#     underwater mountain terrain — the ridgeline towers above
#     the surrounding abyss.
#   - Magma blocks along the ridge provide emergency air via
#     bubble columns, but also deal contact damage.
#   - Exposed ore veins in the volcanic rock are richer than
#     standard ocean floor deposits.
#   - The ridge crest may come within 15 blocks of sea level,
#     making some sections accessible without heavy enchantments.
#   - Excellent location for underwater mining operations.
#   - Dangerous: magma damage, drowned, and deep water combine
#     to create a high-risk, high-reward biome.
# ============================================================

# ------------------------------------
#  Core biome identity
# ------------------------------------
[biome]
# id: Unique namespaced identifier. The underwater ridge is a
# rare tectonic feature with volcanic characteristics.
id = "strata:elysium_underwater_ridge"

# display-name: Shown in F3 debug screen and minimap overlays.
display-name = "Underwater Ridge"

# category: OCEAN for aquatic mechanics and mob spawning.
category = "OCEAN"

# zone: Ocean biomes span all zones — generated by climate
# noise independent of distance from spawn.
zone = "ocean"

# ------------------------------------
#  Climate parameters
# ------------------------------------
[biome.climate]
# temperature: 0.5 = moderate. The geothermal activity warms
# the water locally, raising it above the cold deep-ocean
# baseline but not into tropical territory.
temperature = 0.5

# humidity: 0.4 = slightly drier than standard ocean. The
# volcanic rock and mineral-rich water create a different
# chemical environment than biological ocean zones.
humidity = 0.4

# continentalness: -0.7 = deep oceanic. Mid-ocean ridges form
# far from continental shelves, in the heart of ocean basins.
continentalness = -0.7

# erosion: -0.4 = resistant terrain. The hard volcanic rock
# resists smoothing, maintaining dramatic ridge profiles and
# steep flanks.
erosion = -0.4

# weirdness: 0.4 = notably unusual. Mid-ocean ridges are rare
# geological features — the high weirdness ensures they generate
# only in specific, uncommon noise regions.
weirdness = 0.4

# ------------------------------------
#  Terrain shape
# ------------------------------------
[biome.terrain]
# base-height: -35 blocks below sea level. The ridge floor sits
# above the surrounding abyssal plain but well below the surface.
# The high variation means peaks reach much higher while valleys
# between ridge segments drop deeper.
base-height = -35

# height-variation: 20 = extreme variation. The ridge crest
# towers above the surrounding floor, with steep flanks dropping
# sharply on either side. This is the most dramatic terrain
# variation of any ocean biome.
height-variation = 20

# ------------------------------------
#  Surface composition
# ------------------------------------
[biome.surface]
# top-block: Basalt on the ridge surface. Volcanic rock from
# the tectonic rift that forms the ridge.
top-block = "minecraft:basalt"

# filler-block: Blackstone beneath the basalt cap. Deeper
# volcanic geology exposed by the tectonic uplift.
filler-block = "minecraft:blackstone"

# filler-depth: 4 blocks of blackstone. Thick volcanic layer
# containing the rich mineral deposits.
filler-depth = 4

# underwater-block: Basalt on the ridge floor. Volcanic rock
# extends to the exposed surfaces in all directions.
underwater-block = "minecraft:basalt"

# ------------------------------------
#  Feature generation
# ------------------------------------
[biome.features]
# trees: No trees — deep volcanic ocean biome.
trees = { types = [], density = 0.0 }

# grass-density: 0.0 = no vegetation. The volcanic substrate
# and deep water prevent any plant growth.
grass-density = 0.0

# extra-features: Magma vents, obsidian formations, and ore
# deposits define the ridge's volcanic character.
extra-features = [
    # Magma blocks along the ridge crest and flanks.
    { feature = "magma_vent", density = 6.0 },
    # Obsidian where magma meets cold ocean water.
    { feature = "obsidian_patch", density = 3.0 },
    # Rich ore veins exposed in the volcanic rock.
    { feature = "deep_ore_vein", density = 3.0 },
]

# ------------------------------------
#  Mob spawning
# ------------------------------------
# Sparse life around the hydrothermal vents. Glow squid are
# attracted to the warmth and light from the magma. Drowned
# patrol the darker flanks of the ridge.
[biome.spawning]
# Glow squid near the warm vents — bioluminescent.
glow_squid = { weight = 10, min-group = 1, max-group = 3 }
# Drowned on the ridge flanks — moderate density.
drowned = { weight = 12, min-group = 1, max-group = 3 }
