# ============================================================
#  Biome: Whispering Pale Forest — Whispering Woodlands
# ============================================================
# A ghostly woodland of pale oak trees with bleached white bark,
# pale moss draped from branches, and pale hanging moss carpeting
# the ground. The forest has an ethereal, washed-out appearance —
# as if the color has been drained from the world. Pale garden
# flowers and pale lichen cling to every surface. The atmosphere
# is unsettling and otherworldly, a liminal space between the
# living forest and something else entirely.
#
# Gameplay Notes:
#   - Pale oak wood is a unique building material (white-toned).
#   - Pale moss and pale hanging moss are decorative blocks.
#   - Creaking hearts generate in pale oak trees (1.21+ feature).
#   - The pale color palette makes hostile mobs harder to spot.
#   - This biome generates at the edges of the Whispering zone.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used internally by Strata.
# Must be globally unique across all profiles.
id = "strata:whispering_pale_forest"

# display-name: Human-readable name shown in F3, /strata info, and maps.
display-name = "Whispering Pale Forest"

# category: FOREST — a pale, ghostly forest variant.
category = "FOREST"

# zone: Which zone this biome belongs to. Must match a key in zones.toml.
zone = "whispering"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate values determine where this biome generates in the world.
# Strata uses a 5-axis climate system (matching vanilla 1.18+):
#   temperature:     Hot vs. cold              (-1.0 to 1.0)
#   humidity:        Dry vs. wet               (-1.0 to 1.0)
#   continentalness: Ocean vs. inland          (-1.0 to 1.0)
#   erosion:         Flat vs. mountainous       (-1.0 to 1.0)
#   weirdness:       Normal vs. unusual terrain (-1.0 to 1.0)
[biome.climate]
# temperature: Cool (0.4) — the pale forest feels cold, as if warmth
# itself has been leached from the air along with the color.
temperature = 0.4
# humidity: Moderate — enough moisture for moss but the air feels dry
# and still, lacking the heavy dampness of other whispering biomes.
humidity = 0.65
# continentalness: Mid-inland — forms within the forest interior.
continentalness = 0.5
# erosion: Slightly above neutral — gentle, unremarkable terrain.
# The pale forest's eeriness comes from visuals, not topography.
erosion = 0.55
# weirdness: Very high positive (0.8) — this is the most unusual
# variant in the Whispering zone. The pale, bleached aesthetic
# marks it as deeply strange in the climate noise space.
weirdness = 0.8

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: Standard forest floor elevation.
base-height = 68

# height-variation: Low — the pale forest is eerily flat and uniform,
# reinforcing the unsettling liminal quality of the environment.
height-variation = 3

# -------------------------------------------------------
# Surface Composition
# -------------------------------------------------------
[biome.surface]
# top-block: Pale moss block — the entire ground is covered in a
# blanket of pale, grey-white moss. (Uses pale_moss_block from 1.21+)
top-block = "minecraft:pale_moss_block"

# filler-block: Dirt — normal soil beneath the moss carpet.
filler-block = "minecraft:dirt"

# filler-depth: Standard 3-block depth.
filler-depth = 3

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
[biome.features]
# trees: Pale oak trees with white bark and pale leaves.
# Moderate density — the trees are spaced to allow pale moss
# and pale hanging moss to drape between them.
trees = { types = ["pale_oak"], density = 9 }

# grass-density: Low — pale moss dominates the ground cover.
# Any grass that grows here has the biome's washed-out tint.
grass-density = 2

# flower-density: Low — only pale-toned flowers survive here.
# Lily of the valley and azure bluets match the color scheme.
flower-density = 1.5

# pale-moss-carpet: Additional pale moss carpet layers on the ground
# and on tree branches, enhancing the bleached appearance.
pale-moss-carpet = { enabled = true, density = 10 }

# pale-hanging-moss: Dangles from branches and cave ceilings.
# Creates curtain-like visual obstructions between trees.
pale-hanging-moss = { enabled = true, density = 8 }

# creaking-hearts: Generate inside pale oak tree trunks (1.21+ feature).
# These are the source of the Creaking mob. Rare but impactful.
creaking-hearts = { enabled = true, chance = 0.15 }

# mushrooms: Sparse — even fungi struggle in the pale environment.
mushrooms = { brown = 2, red = 1 }

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
[biome.spawning]
# Elevated hostile spawning — the pale environment provides
# camouflage for skeletons and other light-colored mobs.
hostile-density-multiplier = 1.3

# The Creaking may spawn near creaking hearts at night (1.21+).
# This is controlled by the creaking-hearts feature above.
creaking-enabled = true

# Skeletons blend into the pale bark — increased weight.
skeleton-weight-bonus = 25

# Passive mobs are sparse — the eerie atmosphere deters wildlife.
passive-density-multiplier = 0.4
