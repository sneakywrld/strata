# ============================================================
#  Entity Spawning Configuration — Elysium Overworld
# ============================================================
# Default mob spawning rules. These apply globally; individual
# biomes and zones can override these with their own tables.
#
# Each spawn rule specifies:
#   - mob: The entity type (minecraft:namespace)
#   - weight: Relative spawn chance (higher = more common)
#   - min-group / max-group: Pack size range
#   - category: PASSIVE, HOSTILE, WATER_CREATURE, WATER_AMBIENT, AMBIENT
#   - conditions: Light level, block type, Y range, time of day
# ============================================================

# -------------------------------------------------------
# Passive Mobs
# -------------------------------------------------------

[[spawns]]
mob = "minecraft:cow"
weight = 8
min-group = 2
max-group = 4
category = "PASSIVE"
[spawns.conditions]
# surface: Must spawn on the surface (not in caves).
surface = true
# light-level: Minimum light for spawning.
min-light = 9

[[spawns]]
mob = "minecraft:sheep"
weight = 12
min-group = 2
max-group = 4
category = "PASSIVE"
[spawns.conditions]
surface = true
min-light = 9

