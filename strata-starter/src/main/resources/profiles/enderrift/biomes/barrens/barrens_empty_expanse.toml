# ============================================================
#  Biome: Barrens Empty Expanse — Barrens Zone
# ============================================================
# The most desolate landscape in the End. Flat, featureless end
# stone stretching to the void edge without a single chorus
# plant or crystal to break the monotony. This is the End at
# its most stark and unwelcoming — a vast emptiness that tests
# a player's resolve to keep exploring.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:barrens_empty_expanse"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Empty Expanse"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "barrens"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.3 = cold and lifeless, the barren expanse
# radiates a deep chill of absolute emptiness.
temperature = -0.3

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.8 = extremely dry, no moisture of any kind
# exists in this desolate wasteland.
humidity = -0.8

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.3 = moderate inland, the expanse occupies
# a broad flat area of the barrens island.
continentalness = 0.3

# erosion: Terrain roughness axis. -1.0 = steep mountains,
# 0.0 = moderate hills, 1.0 = pancake flat. 0.9 = nearly flat,
# the defining characteristic of this barren plain.
erosion = 0.9

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# -0.3 = distinctly ordinary — the emptiness is its defining trait,
# not any unusual geological feature.
weirdness = -0.3

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 55 is lower than
# typical End terrain — the barrens sit at a depressed altitude,
# worn down and sunken compared to richer biomes.
# Range: 0 to 256
base-height = 55

# height-variation: Controls terrain undulation. 5 produces subtle
# rolling — barely perceptible elevation changes across the vast
# empty surface.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 5

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — bare, unadorned, the raw floor of the End.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. Solid end stone through and through.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 3 is thin — the barrens islands are not deeply built.
# Range: 1 to 8
filler-depth = 3

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.0 — absolutely no chorus. This is the defining absence of the
# empty expanse: nothing grows here at all.
chorus-density = 0.0

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.0 — no chorus means no flowers.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.0

# end-rod-chance: Per-position probability of decorative end rods.
# 0.0 — no decoration of any kind. Pure emptiness.
# Range: 0.0 to 0.05
end-rod-chance = 0.0

# crystal-chance: Per-position probability of amethyst clusters.
# 0.0 — no crystals. The barren expanse is devoid of all features.
# Range: 0.0 to 0.1
crystal-chance = 0.0

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — no obsidian deposits. Just end stone, all the way across.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# erosion-chance: Per-surface-block probability of end stone erosion.
# 0.01 — minimal erosion. The surface is smooth and undisturbed,
# worn flat by time rather than actively crumbling.
# Range: 0.0 to 0.2
erosion-chance = 0.01

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Reduced presence. Even endermen find little reason
# to linger in this featureless wasteland.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 50, min-group = 1, max-group = 2 }

# shulker: No shulkers — no structures to inhabit.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Minimal. Nothing here attracts endermites.
endermite = { weight = 1, min-group = 1, max-group = 1 }
