# ============================================================
#  Biome: Barrens Ender Graveyard — Barrens Zone
# ============================================================
# A haunting memorial ground where enderman-themed formations
# suggest a final resting place for the End's inhabitants.
# Tall obsidian headstones, end stone mounds, and scattered
# ender pearls mark the landscape. Endermen congregate here
# in unusual numbers and seem reluctant to teleport away.
# Ender pearl drops are more frequent, as if the dimensional
# energy is concentrated in this solemn place.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:barrens_ender_graveyard"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Ender Graveyard"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "barrens"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.4 = cold, the graveyard carries a deep
# chill that makes the air feel heavy and oppressive.
temperature = -0.4

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.6 = dry, but the dense ender particle presence
# gives the air a faint shimmering quality.
humidity = -0.6

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.4 = moderately inland, the graveyard
# occupies a stable, protected area of the barrens island.
continentalness = 0.4

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. 0.5 = gently rolling, the terrain
# has low mounds that serve as grave markers.
erosion = 0.5

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.6 = quite weird — a graveyard for ender beings is a deeply
# unusual concept that marks this as a special location.
weirdness = 0.6

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 55 is standard
# barrens height — the graveyard sits at normal elevation, neither
# raised nor depressed.
# Range: 0 to 256
base-height = 55

# height-variation: Controls terrain undulation. 4 produces gentle
# undulations — low burial mounds and shallow depressions between
# headstone formations.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 4

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — the standard End ground, with obsidian headstones
# placed as feature decorations above.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. Solid end stone.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 4 is standard depth.
# Range: 1 to 8
filler-depth = 4

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.3 — sparse, somber chorus plants stand among the graves like
# mourning figures, their purple hue complementing the atmosphere.
chorus-density = 0.3

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.4 — the chorus plants here flower more readily, as if the
# concentrated ender energy nourishes them.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.4

# end-rod-chance: Per-position probability of decorative end rods.
# 0.01 — end rods serve as grave markers and memorial lights,
# standing upright among the headstones. More frequent than
# typical barrens biomes.
# Range: 0.0 to 0.05
end-rod-chance = 0.01

# obsidian-patches: Number of obsidian patches per chunk.
# 0.8 — obsidian is used for headstones and memorial slabs,
# giving this biome a distinctive dark-spotted appearance.
# Range: 0.0 to 2.0
obsidian-patches = 0.8

# particle-type: The ambient particle effect for this biome.
# "portal" uses ender particles, appearing at higher density
# here due to the concentrated dimensional energy.
particle-type = "minecraft:portal"

# particle-density: Density of ambient ender particles.
# Range: 0.0 to 1.0.
# 0.4 — moderate particle presence, giving the air a faint
# purple shimmer without the dense haze of the dust field.
particle-density = 0.4

# crystal-chance: Per-position probability of amethyst clusters.
# 0.0 — no crystals in the graveyard.
# Range: 0.0 to 0.1
crystal-chance = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Heavily elevated. Endermen gather in the graveyard
# in large groups, standing still among the headstones. This is
# the highest enderman density in the barrens zone.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 150, min-group = 3, max-group = 6 }

# shulker: No shulkers — this is sacred ground, not a structure.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Suppressed. Endermites seem unwelcome in the graveyard,
# as if the congregating endermen drive them away.
endermite = { weight = 0, min-group = 0, max-group = 0 }
