# ============================================================
#  Biome: Barrens Eroded Platform — Barrens Zone
# ============================================================
# A worn-down, flattened island that has been ground smooth by
# eons of exposure to the End's void winds. The surface is
# pitted with shallow craters and irregular holes where end
# stone has eroded away, creating a pockmarked lunar landscape.
# Low-lying and unremarkable except for its beaten appearance.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:barrens_eroded_platform"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Eroded Platform"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "barrens"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.2 = slightly cold, the eroded surface has
# been scoured by void exposure.
temperature = -0.2

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.7 = very dry, matching the stripped, worn
# character of the terrain.
humidity = -0.7

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.2 = closer to the edge, the platform has
# been eroded inward from its original extent.
continentalness = 0.2

# erosion: Terrain roughness axis. -1.0 = steep mountains,
# 0.0 = moderate hills, 1.0 = flat. 0.7 = quite flat but with
# pitting — the platform is worn smooth overall but cratered.
erosion = 0.7

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# -0.1 = mostly ordinary — worn-down terrain is expected in the
# barrens, nothing particularly strange.
weirdness = -0.1

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 50 is notably low —
# this platform has been ground down well below typical End island
# height, reflecting severe long-term erosion.
# Range: 0 to 256
base-height = 50

# height-variation: Controls terrain undulation. 3 is very low —
# the platform is essentially flat, just pitted with surface craters
# rather than having meaningful elevation changes.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 3

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — standard, though visually this surface appears worn
# and pockmarked via erosion features below.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. Solid end stone.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 2 is thin — the platform has been eroded to a thin
# slab of end stone floating over void.
# Range: 1 to 8
filler-depth = 2

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.1 — almost no chorus. The occasional stubborn plant clings to
# the eroded surface, but most cannot take root.
chorus-density = 0.1

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.1 — the rare surviving chorus plants almost never flower.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.1

# end-rod-chance: Per-position probability of decorative end rods.
# 0.0 — no rods on this stripped, bare platform.
# Range: 0.0 to 0.05
end-rod-chance = 0.0

# erosion-chance: Per-surface-block probability of end stone erosion.
# 0.12 — heavy erosion is this biome's defining feature. The surface
# is riddled with shallow pits and missing blocks where end stone
# has worn away.
# Range: 0.0 to 0.2
erosion-chance = 0.12

# crystal-chance: Per-position probability of amethyst clusters.
# 0.0 — erosion has stripped away anything of value.
# Range: 0.0 to 0.1
crystal-chance = 0.0

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — no obsidian on this worn platform.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Low presence on the eroded platform. The thin terrain
# offers little for endermen to interact with.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 45, min-group = 1, max-group = 2 }

# shulker: No shulkers — no structures.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Minimal spawning.
endermite = { weight = 1, min-group = 1, max-group = 1 }
