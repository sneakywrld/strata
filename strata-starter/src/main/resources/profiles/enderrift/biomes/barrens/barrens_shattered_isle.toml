# ============================================================
#  Biome: Barrens Shattered Isle — Barrens Zone
# ============================================================
# A catastrophically broken island that now exists as a loose
# cluster of floating fragments. The original landmass has been
# torn apart — pieces hover at wildly varying heights, some
# barely large enough to stand on. Navigation requires careful
# bridging or ender pearl throws between fragments. The extreme
# height variation makes this one of the most vertically
# dynamic biomes in the barrens.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:barrens_shattered_isle"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Shattered Isle"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "barrens"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.3 = cold, the scattered fragments are
# fully exposed to void winds from all directions.
temperature = -0.3

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.8 = extremely dry, each fragment is a tiny
# isolated rock with no capacity to hold moisture.
humidity = -0.8

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. -0.2 = mostly edge — the shattered nature
# means no point is far from void exposure.
continentalness = -0.2

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. -0.5 = very rough, the shattered
# fragments create extreme terrain irregularity.
erosion = -0.5

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.7 = very weird — a field of floating rock fragments is one of
# the more bizarre sights in the barrens.
weirdness = 0.7

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 50 is the average
# center point of the fragment cluster — individual pieces float
# above and below this midpoint.
# Range: 0 to 256
base-height = 50

# height-variation: Controls terrain undulation. 20 is extreme —
# fragments range from Y30 to Y70, creating massive vertical
# gaps between platforms. This is the highest variation in the
# barrens zone.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 20

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — standard End ground for each fragment.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. End stone.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 2 is very thin — each fragment is a small, thin
# piece of the original island.
# Range: 1 to 8
filler-depth = 2

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.1 — nearly zero. Most fragments are too small to support
# chorus growth, and the unstable terrain discourages rooting.
chorus-density = 0.1

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.15 — the rare surviving plants barely cling to life.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.15

# end-rod-chance: Per-position probability of decorative end rods.
# 0.002 — sparse rods jut from fragment edges, looking like
# remnants of whatever force shattered the original island.
# Range: 0.0 to 0.05
end-rod-chance = 0.002

# erosion-chance: Per-surface-block probability of end stone erosion.
# 0.1 — heavy erosion on the exposed fragment surfaces, which
# continue to crumble at their edges.
# Range: 0.0 to 0.2
erosion-chance = 0.1

# crystal-chance: Per-position probability of amethyst clusters.
# 0.005 — a few crystals exposed in the broken faces of fragments,
# like cross-sections of geological veins.
# Range: 0.0 to 0.1
crystal-chance = 0.005

# obsidian-patches: Number of obsidian patches per chunk.
# 0.1 — rare obsidian veins visible in fragment cross-sections.
# Range: 0.0 to 2.0
obsidian-patches = 0.1

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Standard presence. Endermen have no trouble teleporting
# between fragments, making this terrain trivial for them.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 85, min-group = 1, max-group = 3 }

# shulker: No shulkers — no structures.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Moderate presence among the debris.
endermite = { weight = 3, min-group = 1, max-group = 1 }
