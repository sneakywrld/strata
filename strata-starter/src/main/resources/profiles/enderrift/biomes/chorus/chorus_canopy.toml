# ============================================================
#  Biome: Chorus Canopy — Chorus Domain
# ============================================================
# Chorus plants have grown so densely and branched so widely
# that they form a continuous overhead canopy, blocking the
# End sky. Players walk beneath a ceiling of interlocking
# chorus stems and flowers, casting the end stone floor in
# deep shade. The canopy creates a two-layer biome: the dark
# understory below and the sunlit crown above. Occasional gaps
# in the canopy let thin beams of ambient light through.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:chorus_canopy"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Chorus Canopy"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "chorus"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. 0.15 = slightly warm, the thick canopy traps
# heat in the understory like a greenhouse effect.
temperature = 0.15

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. 0.3 = mildly humid, the canopy creates the
# most humid micro-environment in the End.
humidity = 0.3

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.6 = well inland, canopy formation requires
# large, stable island interiors.
continentalness = 0.6

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. 0.3 = moderately uneven, the
# terrain has some variation with raised roots and depressed areas.
erosion = 0.3

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.4 = moderately unusual — a chorus canopy is an exotic formation
# that changes the biome's entire spatial character.
weirdness = 0.4

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 60 is moderate —
# the understory floor sits at standard height.
# Range: 0 to 256
base-height = 60

# height-variation: Controls terrain undulation. 8 creates moderate
# variation — root mounds, depressed clearings, and raised
# platforms beneath the canopy.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 8

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — the shaded understory floor.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. Solid end stone.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 5 — slightly deeper to support the canopy root systems.
# Range: 1 to 8
filler-depth = 5

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 8.0 — very high density. The plants branch and merge at canopy
# level to form a continuous overhead ceiling.
chorus-density = 8.0

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.35 — moderate flowering at canopy level. Flowers are mostly
# visible from above, not from the shaded understory below.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.35

# chorus-height-min: Minimum height for chorus plants.
# 12 — tall minimum ensures all plants reach canopy level,
# maintaining a consistent ceiling height.
# Range: 3 to 15
chorus-height-min = 12

# chorus-height-max: Maximum height for chorus plants.
# 20 — moderate maximum. The canopy forms at a uniform-ish
# height rather than varying wildly.
# Range: 10 to 30
chorus-height-max = 20

# canopy-coverage: How densely the chorus branches merge overhead.
# Range: 0.0 to 1.0.
# 0.85 — near-complete canopy coverage. Only occasional gaps let
# light through to the understory floor.
canopy-coverage = 0.85

# end-rod-chance: Per-position probability of decorative end rods.
# 0.008 — elevated rod presence in the dark understory, providing
# essential visibility for players navigating beneath the canopy.
# Range: 0.0 to 0.05
end-rod-chance = 0.008

# purpur-density: Purpur growth formations per chunk.
# 0.06 — purpur formations grow at the base of canopy trunks.
# Range: 0.0 to 0.3
purpur-density = 0.06

# crystal-chance: Per-position probability of amethyst clusters.
# 0.0 — no crystals beneath the canopy.
# Range: 0.0 to 0.1
crystal-chance = 0.0

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — no obsidian in the understory.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Elevated presence. The shaded understory provides
# cover that endermen prefer, and they teleport freely between
# the canopy level and the forest floor.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 110, min-group = 2, max-group = 4 }

# shulker: No shulkers beneath the natural canopy.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Moderate presence in the dark understory.
endermite = { weight = 3, min-group = 1, max-group = 2 }
