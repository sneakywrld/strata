# ============================================================
#  Biome: Chorus Crystal Garden — Chorus Domain
# ============================================================
# A stunning fusion of chorus plants and amethyst crystal
# formations. Clusters of purple amethyst grow alongside and
# intertwined with chorus stems, creating a glittering garden
# where organic and mineral blend seamlessly. The crystals
# catch what little light exists in the End, refracting it into
# purple sparkles across the terrain. One of the most visually
# striking biomes in Enderrift.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:chorus_crystal_garden"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Crystal Garden"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "chorus"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. 0.1 = slightly warm, the crystal resonance
# generates a faint warmth perceptible at close range.
temperature = 0.1

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. 0.0 = neutral, a balanced micro-environment
# created by the crystal-chorus symbiosis.
humidity = 0.0

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.5 = moderately inland, the garden needs
# stable terrain for crystal growth.
continentalness = 0.5

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. 0.4 = gently uneven, the crystal
# clusters create subtle terrain bumps.
erosion = 0.4

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.6 = quite weird — the crystal-chorus hybrid garden is an
# exotic formation not seen elsewhere.
weirdness = 0.6

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 65 is slightly
# elevated — the crystal garden sits on a raised platform where
# mineral deposits pushed the terrain upward.
# Range: 0 to 256
base-height = 65

# height-variation: Controls terrain undulation. 5 produces gentle
# hills where crystal clusters create natural mounds and terraces.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 5

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — the base surface, with crystal and chorus decorations
# placed above by the feature system.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. End stone with crystal veins interspersed via
# feature generation.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 5 — deeper than standard to accommodate crystal
# root systems.
# Range: 1 to 8
filler-depth = 5

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 5.0 — moderate-high density. Chorus plants grow alongside
# crystals in a harmonious arrangement.
chorus-density = 5.0

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.45 — moderate-high flowering. The crystal energy seems to
# promote chorus flower development.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.45

# chorus-height-min: Minimum height for chorus plants.
# 5 — standard minimum.
# Range: 3 to 15
chorus-height-min = 5

# chorus-height-max: Maximum height for chorus plants.
# 18 — moderate maximum; growth energy is shared with crystals.
# Range: 10 to 30
chorus-height-max = 18

# crystal-chance: Per-position probability of amethyst clusters.
# 0.08 — very high crystal density. This is the defining feature
# of the crystal garden — amethyst clusters grow abundantly on
# end stone surfaces and alongside chorus stems.
# Range: 0.0 to 0.1
crystal-chance = 0.08

# crystal-types: Types of amethyst formations to generate.
# Includes all growth stages for visual variety.
crystal-types = ["minecraft:small_amethyst_bud", "minecraft:medium_amethyst_bud", "minecraft:large_amethyst_bud", "minecraft:amethyst_cluster"]

# end-rod-chance: Per-position probability of decorative end rods.
# 0.006 — moderate rod presence, adding to the garden's
# illuminated aesthetic.
# Range: 0.0 to 0.05
end-rod-chance = 0.006

# purpur-density: Purpur growth formations per chunk.
# 0.05 — occasional purpur formations blend with the garden.
# Range: 0.0 to 0.3
purpur-density = 0.05

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — no dark obsidian to disrupt the sparkling garden.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Reduced presence. The crystal resonance frequency
# unsettles endermen, causing them to avoid the garden.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 55, min-group = 1, max-group = 2 }

# shulker: No shulkers in the natural garden.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Low presence among the crystals.
endermite = { weight = 2, min-group = 1, max-group = 1 }
