# ============================================================
#  Biome: Chorus Root Network — Chorus Domain
# ============================================================
# The ground level is dominated by sprawling chorus root
# systems that spread horizontally rather than growing upward.
# Thick chorus stems crawl across the end stone surface in a
# tangled web, creating a maze of knee-to-waist-high obstacles.
# The roots interlock and overlap, making straight-line travel
# impossible. Vertical chorus growth is stunted — the energy
# goes into lateral spread.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:chorus_root_network"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Root Network"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "chorus"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. 0.05 = near-neutral, the ground-level root
# spread creates an insulating mat over the end stone.
temperature = 0.05

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. 0.15 = slightly moist, the dense root coverage
# traps whatever trace moisture exists.
humidity = 0.15

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.5 = moderately inland, roots spread from
# central chorus colonies outward.
continentalness = 0.5

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. 0.5 = moderate, the root network
# creates surface-level roughness without major elevation changes.
erosion = 0.5

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.35 = mildly weird — lateral chorus growth is unusual but not
# as extreme as some other chorus variants.
weirdness = 0.35

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 62 is standard
# chorus domain height.
# Range: 0 to 256
base-height = 62

# height-variation: Controls terrain undulation. 4 is low — the
# terrain is fairly level, with the complexity coming from the
# root features above rather than the ground itself.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 4

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone beneath the tangled root network.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. Solid end stone.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 4 is standard depth.
# Range: 1 to 8
filler-depth = 4

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 8.0 — very high density, but configured for horizontal spread
# rather than vertical growth. The plants stay low and branch wide.
chorus-density = 8.0

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.2 — low flowering. Root-focused plants invest little in
# flowers, which appear only at ground-level branch tips.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.2

# chorus-height-min: Minimum height for chorus plants.
# 2 — very short. The roots spread laterally from low bases.
# Range: 3 to 15 (overridden to 2 for this biome)
chorus-height-min = 2

# chorus-height-max: Maximum height for chorus plants.
# 6 — deliberately stunted. All growth energy goes into
# horizontal branching rather than vertical reach.
# Range: 10 to 30 (overridden for this biome)
chorus-height-max = 6

# chorus-branch-factor: Multiplier for horizontal branching.
# Range: 0.5 to 3.0.
# 2.5 — dramatically increased branching. Each chorus stem
# produces many more horizontal branches than normal, creating
# the tangled root network.
chorus-branch-factor = 2.5

# end-rod-chance: Per-position probability of decorative end rods.
# 0.003 — sparse rods poking up through the root tangle.
# Range: 0.0 to 0.05
end-rod-chance = 0.003

# purpur-density: Purpur growth formations per chunk.
# 0.07 — purpur formations intertwine with the root network.
# Range: 0.0 to 0.3
purpur-density = 0.07

# crystal-chance: Per-position probability of amethyst clusters.
# 0.0 — no crystals among the roots.
# Range: 0.0 to 0.1
crystal-chance = 0.0

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — no obsidian beneath the root network.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Reduced presence. The tangled roots make teleportation
# unreliable — endermen frequently teleport into root blocks and
# tend to avoid this biome.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 60, min-group = 1, max-group = 2 }

# shulker: No shulkers in the root network.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Elevated presence. Endermites thrive in the tangled
# roots, using them as cover to hide from endermen.
endermite = { weight = 6, min-group = 1, max-group = 3 }
