# ============================================================
#  Biome: Highlands Ancient Tower — End Highlands
# ============================================================
# Dominated by a massive end city tower that rises far above
# the surrounding terrain, dwarfing even the crystal peaks.
# This is not just another end city — it is a single colossal
# tower structure, the largest individual building in the End.
# The tower's purpur walls are weathered and cracked, with
# sections missing entirely, exposing the dark interior to
# the void. Shulkers patrol every level, and the loot within
# is among the best in the dimension. The surrounding terrain
# is littered with purpur rubble that has fallen from the
# tower over the ages, creating a debris field around the
# base.
#
# Gameplay notes:
#   - Contains a MASSIVE end city tower structure.
#   - Best loot tables in the End dimension.
#   - Heavy shulker presence on every floor.
#   - Weathered walls with gaps — fall risk inside.
#   - Purpur rubble debris field around the base.
#   - Elytra useful for exterior navigation and escape.
#   - The tower is a landmark visible across the void.
#   - Pairs with highlands_end_city_island (standard
#     cities) and highlands_shulker_nest (shulker zones).
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier for the massive tower
# biome in the End highlands.
id = "strata:highlands_ancient_tower"

# display-name: Shown in F3 debug and /strata info.
display-name = "Ancient Tower"

# category: END — End dimension biome.
category = "END"

# region: End Highlands region.
region = "highlands"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
[biome.climate]
# temperature: Cool — the massive tower casts shadows
# across the surrounding terrain. 0.05 = near-neutral,
# slightly cooled by the tower's shadow.
temperature = 0.05

# humidity: Low-to-moderate — the enclosed tower interior
# traps some moisture, but the open surroundings are dry.
# 0.1 = slight humidity from the tower microclimate.
humidity = 0.1

# continentalness: Fixed at 0.0 for End biomes.
continentalness = 0.0

# erosion: Fixed at 0.0 for End biomes.
erosion = 0.0

# weirdness: 0.5 = high weirdness. The ancient tower is
# a rare and dramatic structure — it generates only in
# the most unusual noise conditions, making each
# discovery a significant event.
weirdness = 0.5

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: 70 — moderate elevation. The tower itself
# provides the dramatic height; the terrain base is
# relatively standard. The height-variation creates the
# rubble field and uneven ground around the tower base.
base-height = 70

# height-variation: 15 = high variation. The debris field
# around the tower base creates an uneven, rubble-strewn
# landscape. Fallen purpur blocks, collapsed wall
# sections, and impact craters from fallen debris all
# contribute to the rough terrain.
height-variation = 15

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
[biome.surface]
# top-block: End stone — the natural terrain around the
# tower base. Purpur rubble is feature-placed on top.
top-block = "minecraft:end_stone"

# filler-block: End stone — solid foundation beneath the
# tower and its debris field.
filler-block = "minecraft:end_stone"

# filler-depth: 5 = thick foundation. The massive tower
# structure requires a solid base.
# Range: 1 to 8.
filler-depth = 5

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Purpur rubble from the decaying tower dominates the
# landscape around the base. Sparse chorus plants grow
# in gaps between the debris.
[biome.features]
# end-specific: Fallen purpur debris and structural
# rubble from the ancient tower. Chorus plants grow
# where gaps in the rubble expose end stone surface.
trees = { types = ["chorus_tree"], density = 1.5 }

# grass-density: No grass in the End.
grass-density = 0.0

# extra-features: Tower debris decorations.
#   purpur_rubble — large piles of purpur block debris
#       fallen from the tower walls.
#   purpur_ruin_wall — sections of collapsed tower wall
#       lying at angles in the debris field.
#   end_rod_cluster — broken end rods from the tower
#       interior, some still glowing on the ground.
extra-features = [
    { feature = "purpur_rubble", density = 5.0 },
    { feature = "purpur_ruin_wall", density = 3.0 },
    { feature = "end_rod_cluster", density = 1.5 },
]

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Shulkers spill out of the tower into the surrounding
# debris field. Endermen roam the perimeter.
[biome.spawning]
# enderman: Moderate presence in the open areas around
# the tower. Endermen avoid the rubble-choked areas
# near the tower base.
enderman = { weight = 25, min-group = 1, max-group = 3 }

# shulker: Moderate exterior presence — overflow from
# the tower interior. The structure generator places
# many more inside the tower itself.
shulker = { weight = 15, min-group = 1, max-group = 3 }
