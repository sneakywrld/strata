# ============================================================
#  Biome: Midlands Fossil Bed — Midlands Zone
# ============================================================
# An archaeological wonder of the End — end stone layered with
# embedded bone block formations resembling ancient fossils.
# Whether these are the remains of creatures that once inhabited
# the End or geological curiosities is left to the player's
# imagination. The terrain is low and gently undulating, as if
# worn smooth by eons of exposure.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:midlands_fossil_bed"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Fossil Bed"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "midlands"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.1 = slightly cold, reflecting the ancient,
# long-dead quality of this fossilized landscape.
temperature = -0.1

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.6 = very dry, bone-dry in the most literal
# sense — fossils suggest extreme age and desiccation.
humidity = -0.6

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.5 = solidly inland, these fossil deposits
# are found in the stable interior of midlands islands.
continentalness = 0.5

# erosion: Terrain roughness axis. -1.0 = steep mountains,
# 0.0 = moderate hills, 1.0 = flat. 0.6 = gently rolling,
# the terrain has been smoothed over time, exposing fossil layers.
erosion = 0.6

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.4 = moderately weird — fossils in the End are unusual but not
# as visually extreme as crystalline or fractured biomes.
weirdness = 0.4

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 58 is slightly
# below typical midlands height — erosion has worn this area down,
# exposing deeper fossil-bearing strata.
# Range: 0 to 256
base-height = 58

# height-variation: Controls terrain undulation. 5 produces gentle
# rolling hills with shallow depressions where fossil outcrops
# break the surface.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 5

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — the standard End surface. Bone blocks appear as
# feature decorations embedded in and atop this surface.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. End stone with bone block veins mixed in via
# feature generation below.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 5 is slightly deeper than standard, representing
# the thick fossil-bearing sediment layer.
# Range: 1 to 8
filler-depth = 5

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.3 — very sparse chorus. The fossil bed's compacted terrain
# leaves little room for chorus root systems.
chorus-density = 0.3

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.2 — the few chorus plants that grow here rarely flower.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.2

# fossil-density: Bone block fossil formations per chunk. This is
# the defining feature of this biome — clusters of bone blocks
# partially embedded in end stone, resembling ancient skeletal
# remains or geological bone deposits.
# Range: 0.0 to 5.0.
# 3.0 — dense fossil concentration; nearly every chunk contains
# visible bone block outcrops.
fossil-density = 3.0

# fossil-size-range: Min and max size (in blocks) of individual
# fossil formations. Larger values create more imposing deposits.
# [3, 12] ranges from small bone fragments to large rib-like arcs.
fossil-size-range = [3, 12]

# end-rod-chance: Per-position probability of decorative end rods.
# 0.001 — rare rods that look like exposed fossil spines poking
# through the surface.
# Range: 0.0 to 0.05
end-rod-chance = 0.001

# crystal-chance: Per-position probability of amethyst clusters.
# 0.005 — occasional crystals formed within fossil cavities,
# like geodes inside ancient bone.
# Range: 0.0 to 0.1
crystal-chance = 0.005

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — no obsidian; this biome's character is defined by bone
# and end stone, not volcanic material.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Moderate presence. Endermen seem drawn to the fossil
# beds, perhaps sensing echoes of whatever once lived here.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 80, min-group = 1, max-group = 3 }

# shulker: No shulkers — open terrain, not a structure biome.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Slightly increased. Endermites burrow among the
# fossil deposits, perhaps feeding on ancient ender residue.
endermite = { weight = 4, min-group = 1, max-group = 2 }
