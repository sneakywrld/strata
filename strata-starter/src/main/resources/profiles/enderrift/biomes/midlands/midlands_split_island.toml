# ============================================================
#  Biome: Midlands Split Island — Midlands Zone
# ============================================================
# A dramatic island fractured cleanly in half by a deep void
# crack. The two halves sit close enough to bridge or pearl
# across, but the yawning gap between them drops into nothing.
# Terrain on each half tilts slightly toward the rift, creating
# uneven footing and a constant sense of precariousness.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:midlands_split_island"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Split Island"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "midlands"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. 0.0 = the neutral chill of the End dimension.
temperature = 0.0

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.5 = dry and lifeless, typical End atmosphere.
humidity = -0.5

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.1 = close to the island edge — the fracture
# means much of this biome is near a void boundary.
continentalness = 0.1

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate variation, 1.0 = flat. -0.2 = moderately rough,
# representing the jagged terrain created by the island's fracture.
erosion = -0.2

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.6 = notably strange — a cracked island is an unusual geological
# feature even by End standards.
weirdness = 0.6

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 60 places the
# halves slightly lower than typical midlands, suggesting the
# fracture event caused subsidence.
# Range: 0 to 256
base-height = 60

# height-variation: Controls terrain undulation. 12 is high for the
# midlands — the two island halves have dramatic height differences
# as each tilts toward the central void gap.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 12

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — standard End ground material.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. End stone forms the island's internal mass.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 4 gives a standard island thickness.
# Range: 1 to 8
filler-depth = 4

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.5 — sparse chorus clings to the fractured terrain; most plants
# would have fallen into the void when the island split.
chorus-density = 0.5

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.2 — low flowering rate; harsh conditions on the split island
# discourage full bloom.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.2

# end-rod-chance: Per-position probability of decorative end rods.
# 0.003 — occasional rods mark the rift edge, hinting at whatever
# force tore the island apart.
# Range: 0.0 to 0.05
end-rod-chance = 0.003

# erosion-chance: Per-surface-block probability of end stone erosion.
# 0.08 — heavy erosion near the fracture zone, creating pitted and
# crumbling surfaces that reinforce the shattered aesthetic.
# Range: 0.0 to 0.2
erosion-chance = 0.08

# crystal-chance: Per-position probability of amethyst clusters.
# 0.01 — the fracture exposed a few crystal veins in the broken faces
# of the island halves.
# Range: 0.0 to 0.1
crystal-chance = 0.01

# obsidian-patches: Number of obsidian patches per chunk.
# 0.3 — small obsidian deposits exposed by the fracture, visible
# in the cliff faces along the void gap.
# Range: 0.0 to 2.0
obsidian-patches = 0.3

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Standard presence. Endermen teleport freely across
# the void gap, unbothered by the terrain fracture.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 90, min-group = 1, max-group = 3 }

# shulker: No shulkers — this is open terrain, not a structure.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Slightly elevated presence. The fracture's instability
# seems to attract endermites.
endermite = { weight = 5, min-group = 1, max-group = 2 }
