# ============================================================
#  Biome: Void Ender Pearl Field — Void Islands
# ============================================================
# A flat expanse saturated with ender particle energy, where
# the air shimmers with dense purple particles and endermen
# gather in extraordinary numbers. The dimensional fabric is
# thin here — ender pearls seem to drop more frequently, and
# the constant particle haze creates a dreamlike atmosphere.
# This is an enderman paradise: peaceful for them, unsettling
# for players navigating through crowds of tall dark figures.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:void_ender_pearl_field"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Ender Pearl Field"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "void"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.1 = near neutral, the dense ender energy
# creates a slightly warmed micro-environment.
temperature = -0.1

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.4 = dry, though the particle density gives
# the air a faint tangible quality.
humidity = -0.4

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.3 = moderate island size, the pearl field
# occupies a stable platform.
continentalness = 0.3

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. 0.7 = quite flat, the field is
# a smooth expanse suitable for large enderman gatherings.
erosion = 0.7

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.4 = moderately weird — the intense particle concentration and
# enderman density are unusual.
weirdness = 0.4

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 58 is slightly
# below average void island height — the field sits in a subtle
# depression that pools ender energy.
# Range: 0 to 256
base-height = 58

# height-variation: Controls terrain undulation. 4 is low — the
# flat terrain allows endermen to wander freely and players to
# see them from a distance (for better or worse).
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 4

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — standard surface, the ender energy is atmospheric
# rather than geological.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. Solid end stone.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 4 is standard depth.
# Range: 1 to 8
filler-depth = 4

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.5 — sparse chorus. The plants are incidental; the biome's
# character comes from its atmosphere and inhabitants.
chorus-density = 0.5

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.3 — moderate flowering on the few plants present.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.3

# end-rod-chance: Per-position probability of decorative end rods.
# 0.003 — sparse rods that glow faintly in the particle haze.
# Range: 0.0 to 0.05
end-rod-chance = 0.003

# particle-type: The ambient particle effect for this biome.
# "portal" uses the purple ender particle at high density,
# creating the field's signature shimmering atmosphere.
particle-type = "minecraft:portal"

# particle-density: Density of ambient ender particles.
# Range: 0.0 to 1.0.
# 0.7 — very dense particle presence. The air is thick with
# purple particles, reducing visibility and creating a surreal
# dreamscape effect.
particle-density = 0.7

# crystal-chance: Per-position probability of amethyst clusters.
# 0.0 — no crystals; the biome's visual interest comes from
# particles and enderman density.
# Range: 0.0 to 0.1
crystal-chance = 0.0

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — no obsidian in the pearl field.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Maximum presence. This is the highest enderman density
# in all of Enderrift. The field is an enderman paradise — dozens
# stand silently in the particle haze, teleporting occasionally.
# Ender pearl drop rates feel elevated simply due to the sheer
# number of endermen present.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 200, min-group = 4, max-group = 8 }

# shulker: No shulkers in the open field.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Elevated. The concentrated ender energy causes
# frequent endermite materialization.
endermite = { weight = 8, min-group = 1, max-group = 3 }
