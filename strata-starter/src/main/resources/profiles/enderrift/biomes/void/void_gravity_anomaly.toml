# ============================================================
#  Biome: Void Gravity Anomaly — Void Islands
# ============================================================
# A region where the normal rules of End island generation seem
# to break down. Terrain floats in impossible orientations —
# vertical walls of end stone, inverted platforms hanging from
# nothing, and diagonal slabs defying gravity. The extreme
# height variation creates wildly unpredictable terrain that
# requires creative navigation. The dimensional fabric is
# warped here, bending space in visible, unsettling ways.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:void_gravity_anomaly"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Gravity Anomaly"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "void"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.3 = cold, the warped space creates
# unpredictable temperature pockets — averaging to a chill.
temperature = -0.3

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.5 = dry, the dimensional distortion does
# not create moisture.
humidity = -0.5

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. -0.1 = near-edge — the floating fragments
# of the anomaly blur the distinction between island and void.
continentalness = -0.1

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. -0.8 = extremely rough — the
# gravity anomaly creates the most chaotic terrain profile in
# Enderrift, with impossible overhangs and floating platforms.
erosion = -0.8

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.95 = near-maximum weirdness — floating terrain in impossible
# orientations is almost as bizarre as a biome can get.
weirdness = 0.95

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 60 is the
# nominal center point, but individual terrain features range
# wildly above and below this value.
# Range: 0 to 256
base-height = 60

# height-variation: Controls terrain undulation. 30 is the maximum —
# terrain ranges from Y30 to Y90 in chaotic, impossible patterns.
# This is the highest height variation in all of Enderrift.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 30

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# End stone — standard material, but oriented in all directions
# by the terrain generator.
top-block = "minecraft:end_stone"

# filler-block: The block placed below the top block down to
# filler-depth. End stone.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 3 — thin fragments in an anomaly zone.
# Range: 1 to 8
filler-depth = 3

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.8 — moderate sparse chorus. Plants somehow grow on the
# impossible surfaces, adding to the disorienting visual.
chorus-density = 0.8

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.3 — moderate flowering on the anomalous terrain.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.3

# end-rod-chance: Per-position probability of decorative end rods.
# 0.007 — end rods appear at various orientations, some seemingly
# defying gravity alongside the terrain they are placed on.
# Range: 0.0 to 0.05
end-rod-chance = 0.007

# crystal-chance: Per-position probability of amethyst clusters.
# 0.02 — crystals grow in unexpected locations throughout the
# anomaly, adding to the visual chaos.
# Range: 0.0 to 0.1
crystal-chance = 0.02

# obsidian-patches: Number of obsidian patches per chunk.
# 0.4 — scattered obsidian fragments caught in the gravitational
# distortion.
# Range: 0.0 to 2.0
obsidian-patches = 0.4

# erosion-chance: Per-surface-block probability of end stone erosion.
# 0.05 — moderate erosion where the dimensional stress is greatest.
# Range: 0.0 to 0.2
erosion-chance = 0.05

# particle-type: The ambient particle effect for this biome.
# "portal" particles swirl in unusual patterns, caught in the
# warped gravity.
particle-type = "minecraft:portal"

# particle-density: Density of ambient particles.
# Range: 0.0 to 1.0.
# 0.3 — moderate particle presence, swirling in non-standard
# patterns that emphasize the gravity distortion.
particle-density = 0.3

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Standard presence. Endermen navigate the anomaly
# effortlessly via teleportation, seemingly unaffected by the
# warped gravity.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 100, min-group = 1, max-group = 4 }

# shulker: No shulkers in the anomaly.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Elevated presence. The dimensional distortion
# causes frequent spontaneous endermite generation, as if the
# warped space is tearing holes small creatures slip through.
endermite = { weight = 8, min-group = 1, max-group = 3 }
