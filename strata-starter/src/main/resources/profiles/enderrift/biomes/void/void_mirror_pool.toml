# ============================================================
#  Biome: Void Mirror Pool — Void Islands
# ============================================================
# An eerily flat obsidian platform that mirrors the End sky
# on its polished surface. The terrain is nearly perfectly
# level — the lowest height variation in all of Enderrift.
# The dark obsidian surface creates an uncanny reflection
# effect, making it difficult to distinguish up from down at
# the boundaries. Walking across the mirror pool feels like
# walking on the sky itself.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:void_mirror_pool"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Mirror Pool"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "void"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.4 = cold, the flat obsidian radiates a
# steady chill across the entire surface.
temperature = -0.4

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.6 = dry, polished obsidian sheds all moisture.
humidity = -0.6

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.3 = moderate, the mirror pool is a
# reasonably sized platform.
continentalness = 0.3

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. 1.0 = perfectly flat — the mirror
# pool's defining characteristic. This is the flattest biome in
# the entire profile.
erosion = 1.0

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.9 = extremely weird — a perfectly flat obsidian mirror in the
# void is one of the most surreal sights in the End.
weirdness = 0.9

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 62 is moderate,
# placing the mirror pool at a comfortable altitude.
# Range: 0 to 256
base-height = 62

# height-variation: Controls terrain undulation. 1 is the absolute
# minimum practical value — the mirror pool is as flat as the
# generator can produce. No bumps, no dips, just a perfect
# obsidian plane.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 1

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# Obsidian — the polished mirror surface. Its dark, reflective
# quality creates the sky-reflection visual effect.
top-block = "minecraft:obsidian"

# filler-block: The block placed below the top block down to
# filler-depth. End stone beneath the obsidian mirror.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 3 — thin platform beneath the mirror surface.
# Range: 1 to 8
filler-depth = 3

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; obsidian to maintain the mirror aesthetic.
underwater-block = "minecraft:obsidian"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.0 — absolutely nothing grows on the mirror pool. The polished
# obsidian surface is completely featureless.
chorus-density = 0.0

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.0 — no chorus, no flowers.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.0

# end-rod-chance: Per-position probability of decorative end rods.
# 0.0 — no rods. The mirror surface must remain unbroken to
# maintain its reflective quality.
# Range: 0.0 to 0.05
end-rod-chance = 0.0

# crystal-chance: Per-position probability of amethyst clusters.
# 0.0 — no crystals on the pristine surface.
# Range: 0.0 to 0.1
crystal-chance = 0.0

# obsidian-patches: Number of obsidian patches per chunk.
# 0.0 — the entire surface is already obsidian; no additional
# patches needed.
# Range: 0.0 to 2.0
obsidian-patches = 0.0

# erosion-chance: Per-surface-block probability of erosion.
# 0.0 — no erosion. The mirror surface is perfectly preserved.
# Range: 0.0 to 0.2
erosion-chance = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Reduced presence. The perfectly flat, exposed surface
# offers no cover or visual interest for endermen. Those that
# do spawn here stand eerily still on the reflective surface.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 40, min-group = 1, max-group = 2 }

# shulker: No shulkers on the flat mirror.
shulker = { weight = 0, min-group = 0, max-group = 0 }

# endermite: Very rare. The smooth surface provides no hiding places.
endermite = { weight = 1, min-group = 1, max-group = 1 }
