# ============================================================
#  Biome: Void Obsidian Fortress — Void Islands
# ============================================================
# A natural obsidian formation that resembles a fortress or
# castle rising from the void. Sheer obsidian walls, angular
# buttresses, and tower-like spires give the formation an
# architectural quality, though it was created by geological
# forces rather than builders. The dark, imposing structure
# contrasts starkly with the pale end stone beneath. High
# variation creates dramatic vertical walls and battlements.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier used by the generator to reference
# this biome internally. Must be unique across the entire profile.
# Format: "strata:<zone>_<biome_name>"
id = "strata:void_obsidian_fortress"

# display-name: Human-readable name shown to players in F3 debug,
# /strata info, and zone-entry messages.
display-name = "Obsidian Fortress"

# category: The broad Minecraft biome category this belongs to.
# Affects ambient sounds, sky color, and some mob behavior.
# Valid values: NONE, PLAINS, FOREST, TAIGA, DESERT, SWAMP,
#               SAVANNA, BADLANDS, JUNGLE, MOUNTAIN, OCEAN,
#               RIVER, BEACH, CAVE, MUSHROOM, NETHER, END
category = "END"

# zone: Which zone this biome belongs to. Must match a zone key
# defined in zones/zones.toml. Biomes only generate within their zone.
zone = "void"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
# Climate is a 5-dimensional coordinate that determines where this
# biome places in the world. The noise-based climate system picks the
# biome whose climate point is closest to the local climate values.
# Each axis ranges from -1.0 to 1.0.
[biome.climate]
# temperature: Thermal axis. -1.0 = freezing, 0.0 = temperate,
# 1.0 = scorching. -0.6 = cold, the obsidian mass absorbs heat
# and radiates a deep, penetrating chill.
temperature = -0.6

# humidity: Moisture axis. -1.0 = parched, 0.0 = moderate,
# 1.0 = soaking. -0.7 = very dry, obsidian is completely non-porous.
humidity = -0.7

# continentalness: Land-mass axis. -1.0 = deep void, 0.0 = island edge,
# 1.0 = island center. 0.3 = moderate, the fortress is a substantial
# formation but surrounded by void on most sides.
continentalness = 0.3

# erosion: Terrain roughness axis. -1.0 = steep cliffs,
# 0.0 = moderate, 1.0 = flat. -0.6 = very rough, the fortress
# walls create sheer vertical faces and angular terrain.
erosion = -0.6

# weirdness: Variant axis. -1.0 = normal, 1.0 = bizarre mutation.
# 0.7 = very weird — the fortress-like natural formation is one
# of the most architecturally improbable sights in the End.
weirdness = 0.7

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: The Y-level of the island surface. 65 is above
# average — the fortress commands an elevated position.
# Range: 0 to 256
base-height = 65

# height-variation: Controls terrain undulation. 20 is extreme —
# the fortress towers and walls create massive vertical variations,
# from deep courtyards to tall battlements.
# Range: 0 (flat) to 30 (extreme peaks)
height-variation = 20

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
# These override the global surface rules for this biome specifically.
[biome.surface]
# top-block: The block placed on the very top surface (depth 0).
# Obsidian — the fortress is clad in dark obsidian, giving it
# the imposing black exterior.
top-block = "minecraft:obsidian"

# filler-block: The block placed below the top block down to
# filler-depth. End stone beneath the obsidian shell — the
# fortress has an obsidian exterior over an end stone skeleton.
filler-block = "minecraft:end_stone"

# filler-depth: How many blocks of filler-block sit beneath the
# top-block. 6 — deep fill for a massive formation.
# Range: 1 to 8
filler-depth = 6

# underwater-block: Fallback block for any liquid body beds.
# No water in the End; end_stone as defensive default.
underwater-block = "minecraft:end_stone"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
# Features control what vegetation, structures, and details are
# placed on the terrain during world generation.
[biome.features]
# chorus-density: Chorus plant placements per chunk.
# Range: 0.0 to 10.0.
# 0.0 — no chorus grows on the obsidian fortress. The smooth,
# impenetrable obsidian surface prevents any plant rooting.
chorus-density = 0.0

# chorus-flower-chance: Probability of flower atop chorus plants.
# 0.0 — no chorus present.
# Range: 0.0 to 1.0
chorus-flower-chance = 0.0

# end-rod-chance: Per-position probability of decorative end rods.
# 0.006 — scattered end rods on the fortress walls and battlements,
# resembling torches in a medieval castle.
# Range: 0.0 to 0.05
end-rod-chance = 0.006

# obsidian-patches: Number of obsidian patches per chunk.
# 2.0 — maximum obsidian presence. The fortress and its surrounding
# terrain are saturated with obsidian formations.
# Range: 0.0 to 2.0
obsidian-patches = 2.0

# crystal-chance: Per-position probability of amethyst clusters.
# 0.015 — occasional crystals embedded in the obsidian walls,
# catching light like jewels in dark stone.
# Range: 0.0 to 0.1
crystal-chance = 0.015

# erosion-chance: Per-surface-block probability of end stone erosion.
# 0.0 — obsidian does not erode. The fortress stands unchanged.
# Range: 0.0 to 0.2
erosion-chance = 0.0

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Biome-specific spawn rules that add to or override the global
# spawning table in entities/spawning.toml.
[biome.spawning]
# enderman: Elevated presence. Endermen occupy the fortress like
# guards, teleporting between tower tops and courtyard floors.
# weight: Relative spawn chance (global default is 100).
enderman = { weight = 120, min-group = 2, max-group = 5 }

# shulker: Low but present. A few shulkers cling to the fortress
# walls, as if the obsidian formation attracted them like a
# natural end city.
shulker = { weight = 5, min-group = 1, max-group = 1 }

# endermite: Moderate presence within the fortress.
endermite = { weight = 3, min-group = 1, max-group = 2 }
