# ============================================================
#  Noise Functions — Enderrift (End)
# ============================================================
# End-specific noise functions for island placement, terrain
# shape, and biome distribution.
# ============================================================

# -------------------------------------------------------
# Island Placement
# -------------------------------------------------------

# Primary island placement noise. Determines where islands exist.
[functions."strata:end_island"]
type = "simplex"
# Low frequency = large island clusters with wide void gaps.
frequency = 0.002
seed-offset = 9000
[functions."strata:end_island".fractal]
octaves = 4
lacunarity = 2.0
gain = 0.5

# Island shape noise: 3D detail for island terrain surfaces.
[functions."strata:end_shape"]
type = "open_simplex_2"
frequency = 0.02
seed-offset = 9010
[functions."strata:end_shape".fractal]
octaves = 3
lacunarity = 2.5
gain = 0.4

