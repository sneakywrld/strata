# ============================================================
#  Biome: Soul Fog Hollow — Soul Regions
# ============================================================
# A deep depression in the soul sand valley filled with an
# impenetrably dense fog of soul particles. The fog is so thick
# that visibility drops to a few blocks — the world beyond that
# radius simply ceases to exist in a wall of translucent blue-
# gray haze. The ground beneath is soul soil, its surface barely
# visible even directly underfoot. Sound is muffled and
# directionless within the fog, making it impossible to locate
# threats by audio cues. Skeletons and ghasts can be heard but
# not seen until they are dangerously close, their arrows and
# fireballs materializing from the fog without warning. The
# fog hollow is a sensory deprivation chamber — players lose
# all orientation, all distance perception, and most of their
# reaction time. Navigation requires compass, coordinates, or
# a trail of placed blocks to find the way out.
#
# Gameplay notes:
#   - Extremely low visibility — 3-5 block render distance effect.
#   - Directional audio unreliable — mobs appear without warning.
#   - Ghast fireballs emerge from the fog with no reaction time.
#   - Block trail or coordinates mandatory for navigation.
#   - Shield essential — can't see incoming attacks.
#   - One of the most disorienting biomes in the Netherveil.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier. The fog hollow is the most
# disorienting and visibility-limited soul biome.
id = "strata:soul_fog_hollow"

# display-name: Human-readable name for player displays.
display-name = "Soul Fog Hollow"

# category: NETHER — enclosed nether depression with extreme
# soul particle density creating near-zero visibility.
category = "NETHER"

# zone: Part of the soul zone — the deepest and most fog-
# saturated depression within the soul regions.
zone = "soul"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
[biome.climate]
# temperature: Cold for the nether — the dense soul particle
# fog absorbs heat, creating the coldest pocket in the soul
# regions.
#   0.05 = near-minimum temperature, frigid soul fog.
temperature = 0.05

# humidity: The fog represents extreme atmospheric particle
# density, though not organic humidity.
#   -0.3 = moderate aridity — the fog is soul particles, not water.
humidity = -0.3

# continentalness: Strongly negative — the hollow is a deep
# depression in the soul sand valley.
#   -0.5 = deep depression, well below standard level.
continentalness = -0.5

# erosion: High — the hollow floor is smooth and featureless,
# no landmarks visible through the fog anyway.
#   0.8 = smooth depression floor.
erosion = 0.8

# weirdness: Very high — the extreme soul particle fog is one
# of the most unusual atmospheric phenomena in the nether.
#   0.8 = highly unusual fog density.
weirdness = 0.8

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: Low — the hollow is a deep depression that
# collects soul particles in a dense pool of fog.
#   30 = well below standard floor, deep depression.
base-height = 30

# height-variation: Very low — the depression floor is smooth,
# but the terrain is irrelevant since nothing is visible.
#   1.5 = nearly flat depression floor.
height-variation = 1.5

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
[biome.surface]
# top-block: Soul soil — the depression floor is soul soil,
# which emits the soul particles that form the fog.
top-block = "minecraft:soul_soil"

# filler-block: Netherrack beneath the soul soil.
filler-block = "minecraft:netherrack"

# filler-depth: Standard depth.
#   4 = typical soul soil depth.
filler-depth = 4

# underwater-block: Soul sand at lava boundaries.
underwater-block = "minecraft:soul_sand"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
[biome.features]
# trees: No vegetation in the fog-filled hollow.
trees = { types = [], density = 0.0 }

# grass-density: No plant life on soul soil.
grass-density = 0.0

# flower-density: No flowers in the nether.
flower-density = 0.0

# extra-features: Fog hollow specific features.
#   soul_fog_emitter — concentrated soul particle generators
#     creating the extreme fog density. Maximum output.
#   soul_fire — dim blue fire barely visible through the fog.
#   soul_sand_patch — soul sand patches adding movement hazard.
extra-features = [
    { feature = "soul_fog_emitter", density = 15.0 },
    { feature = "soul_fire", density = 3.0 },
    { feature = "soul_sand_patch", density = 3.0 },
]

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
# Mobs that attack from within the fog — invisible until the
# moment of impact.
[biome.spawning]
# ghast: Terrifying in the fog — fireballs appear from nowhere.
# The ghast cries are muffled and directionless.
ghast = { weight = 12, min-group = 1, max-group = 1 }

# skeleton: Skeletons fire arrows from within the fog, their
# positions invisible until combat range.
skeleton = { weight = 14, min-group = 2, max-group = 4 }

# enderman: Endermen lurk in the fog — accidental eye contact
# is inevitable when they appear at close range.
enderman = { weight = 5, min-group = 1, max-group = 2 }
