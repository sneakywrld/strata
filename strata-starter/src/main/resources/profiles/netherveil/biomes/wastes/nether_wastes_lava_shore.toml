# ============================================================
#  Biome: Nether Wastes Lava Shore — Nether Wastes Region
# ============================================================
# The jagged netherrack coastline where solid ground meets the
# vast lava ocean. Magma blocks form a treacherous transitional
# strip between stable terrain and the molten sea, their
# surfaces cracking with escaping gases. Striders wade through
# the shallows on their long legs, the only creatures that
# thrive in these extreme temperatures. The constant heat
# shimmer distorts visibility, and one wrong step sends you
# plunging into lava. The shore is both a natural barrier and
# a resource — striders can be saddled for lava ocean travel.
#
# Gameplay notes:
#   - Strider riding hub — saddle a strider to cross lava oceans.
#   - Magma block damage hazard along the entire shoreline.
#   - Fire Resistance potions strongly recommended.
#   - Lava fishing possible with the right setup.
#   - Ghasts are especially dangerous here — fireballs knock
#     players into lava with no solid ground nearby.
# ============================================================

# -------------------------------------------------------
# Biome Identity
# -------------------------------------------------------
[biome]
# id: Unique namespaced identifier. The lava shore variant
# generates at the boundary between nether wastes and lava oceans.
id = "strata:nether_wastes_lava_shore"

# display-name: Human-readable name for player-facing displays.
display-name = "Nether Wastes Lava Shore"

# category: NETHER — nether ambient sounds and fog coloring.
category = "NETHER"

# zone: Part of the wastes region — the coastal edge of the
# standard nether wasteland.
zone = "wastes"

# -------------------------------------------------------
# Climate Parameters
# -------------------------------------------------------
[biome.climate]
# temperature: Elevated heat from proximity to the lava ocean.
#   0.6 = hotter than standard wastes due to radiant lava heat.
temperature = 0.6

# humidity: Negative — the intense lava heat evaporates any
# moisture. The air is parched and shimmering.
#   -0.2 = dry conditions along the lava boundary.
humidity = -0.2

# continentalness: Negative — this biome generates at the
# boundary between land and lava ocean.
#   -0.5 = coastal placement, at the lava sea edge.
continentalness = -0.5

# erosion: High erosion — the lava has eaten away at the
# shoreline, creating a flat, fragile coast.
#   0.7 = heavily eroded by lava contact over time.
erosion = 0.7

# weirdness: Slightly unusual — the magma block formations
# create an atypical terrain pattern.
#   0.1 = mildly unusual terrain features.
weirdness = 0.1

# -------------------------------------------------------
# Terrain Shape
# -------------------------------------------------------
[biome.terrain]
# base-height: Low — the shore sits just above lava level.
#   33 = barely above the lava ocean (Y=31), creating a narrow
#   strip of walkable ground that frequently dips into lava.
base-height = 33

# height-variation: Low variation — the shore is relatively
# flat, sloping gently into the lava ocean.
#   2.0 = gentle undulation, occasionally dipping below lava level.
height-variation = 2.0

# -------------------------------------------------------
# Surface Blocks
# -------------------------------------------------------
[biome.surface]
# top-block: Netherrack surface, the standard nether ground
# block, but frequently interrupted by magma block patches.
top-block = "minecraft:netherrack"

# filler-block: Netherrack substrate continuing below the surface.
filler-block = "minecraft:netherrack"

# filler-depth: Shallow fill — the lava ocean is close beneath.
#   3 = thin crust of netherrack before lava pockets appear.
filler-depth = 3

# underwater-block: Magma blocks line the lava ocean floor,
# creating bubble columns that pull entities downward.
underwater-block = "minecraft:magma_block"

# -------------------------------------------------------
# Feature Decoration
# -------------------------------------------------------
[biome.features]
# trees: No vegetation on the scorching lava shore.
trees = { types = [], density = 0.0 }

# grass-density: No plant life survives the extreme heat.
grass-density = 0.0

# flower-density: No flowers in the nether.
flower-density = 0.0

# extra-features: Lava shore specific features.
#   magma_block_shore — magma block strips along the coast.
#   lava_pool — additional lava pockets in the netherrack.
#   strider_spawn_point — marks strider congregation areas.
extra-features = [
    { feature = "magma_block_shore", density = 8.0 },
    { feature = "lava_pool", density = 4.0 },
    { feature = "strider_spawn_point", density = 2.0 },
]

# -------------------------------------------------------
# Mob Spawning Overrides
# -------------------------------------------------------
[biome.spawning]
# strider: The signature mob of lava shores. These passive mobs
# walk on lava and can be ridden with a warped fungus on a stick.
# High weight ensures they are common along the shore.
strider = { weight = 20, min-group = 1, max-group = 3 }

# zombified_piglin: Still present along the shore but in smaller
# numbers than the open wastes — less room for herds.
zombified_piglin = { weight = 12, min-group = 2, max-group = 4 }

# ghast: Especially dangerous here — their fireballs can knock
# players into the adjacent lava ocean. Present but not dominant.
ghast = { weight = 6, min-group = 1, max-group = 1 }

# magma_cube: Abundant near the lava shore, blending in with
# the magma blocks that line the coast.
magma_cube = { weight = 10, min-group = 1, max-group = 4 }
