# ============================================================
#  Noise Functions — Netherveil (Nether)
# ============================================================
# Noise functions specific to nether terrain generation.
# The nether uses different noise characteristics than the
# overworld — more chaotic, higher contrast, sharper features.
# ============================================================

# -------------------------------------------------------
# Terrain Noises
# -------------------------------------------------------

# Primary nether terrain: creates the large-scale cave shapes.
[functions."strata:nether_terrain"]
type = "open_simplex_2"
frequency = 0.01
seed-offset = 5000
[functions."strata:nether_terrain".fractal]
octaves = 4
lacunarity = 2.0
gain = 0.5

# Detail noise: adds surface roughness to nether walls.
[functions."strata:nether_detail"]
type = "simplex"
frequency = 0.05
seed-offset = 5010
[functions."strata:nether_detail".fractal]
octaves = 3
lacunarity = 2.5
gain = 0.4

